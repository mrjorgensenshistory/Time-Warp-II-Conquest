<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Bangers&display=swap" rel="stylesheet">
<title>Time Warp - Narvaez</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    color: white;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}
.slide {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
    flex-direction: column;
}
.slide.active {
    display: flex;
    opacity: 1;
}
.slide-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 0;
}
.slide-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.15);
}
.slide-content {
    position: relative;
    z-index: 1;
    padding: 1vh 1vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-end;
    max-width: 100%;
}
/* Text box: solid white — matching PPTX Bangers font style */
.text-box {
    background: #fff;
    border: 2px solid #000;
    padding: 2vh 2.5vw;
    margin: 1vh 1vw 1vh auto;
    max-width: 50%;
    color: #000;
    font-size: clamp(1rem, 1.7vw, 1.3rem);
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-weight: normal;
    line-height: 1.5;
    letter-spacing: 0.5px;
}
/* Dark theme text box - slides WITHOUT background images */
.text-box-dark {
    background: transparent !important;
    border: none !important;
    color: #e0e0e0 !important;
    font-style: normal !important;
    text-transform: none !important;
    font-size: clamp(1rem, 1.8vw, 1.3rem) !important;
    line-height: 1.8 !important;
    max-width: 85% !important;
    margin: 2vh auto !important;
    text-align: center !important;
    padding: 3vh 4vw !important;
}
.text-box-dark .text-line {
    color: #e0e0e0;
}
/* PPTX-extracted positioned text blocks */
.pptx-text {
    line-height: 1.4;
    word-wrap: break-word;
    overflow: hidden;
}
.text-line {
    margin-bottom: 0.5em;
}
.reveal-hidden {
    opacity: 0 !important;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal-hidden.revealed {
    opacity: 1 !important;
    transform: translateY(0);
}
.slide-title {
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-weight: bold;
    margin-bottom: 1.5vh;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.accent-images {
    position: absolute;
    right: 3vw;
    top: 12vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}
.accent-images img {
    max-width: 30vw;
    max-height: 35vh;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
/* Fullscreen GIFs — displayed large, centered */
.fullscreen-gif {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    max-width: 80vw;
    max-height: 70vh;
    border-radius: 8px;
}
.buttons {
    position: absolute;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 1vh;
    z-index: 3;
    max-width: 55%;
    align-items: center;
}
.btn {
    background: #fff;
    color: #000;
    border: 2px solid #000;
    border-radius: 0;
    padding: 1.5vh 3vw;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-size: clamp(0.9rem, 1.5vw, 1.15rem);
    font-weight: normal;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 25vw;
    text-align: center;
    letter-spacing: 0.5px;
}
.btn:hover {
    background: #eee;
    transform: scale(1.02);
}
.gameover-slide .slide-title {
    color: #ff3333;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-align: center;
    animation: shake 0.5s ease;
}
.gameover-slide .btn {
    background: #cc0000;
    border-color: #cc0000;
    color: #fff;
}
.gameover-slide .btn:hover {
    background: #ff3333;
}
#fullscreen-btn {
    position: fixed;
    top: 1vh; right: 1vw;
    z-index: 999;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 5px;
    padding: 0.5vh 1vw;
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0.5;
}
#fullscreen-btn:hover { opacity: 1; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}
</style>
</head>
<body>
<div id="game"></div>
<button id="fullscreen-btn" onclick="toggleFullscreen()">&#x26F6; Fullscreen</button>

r", "title": "It's tough to be a god…", "body": "Narváez landed in Florida looking for gold. He found a swamp. 300 men entered. Four came out.\n\nYou are confident you can find your own path. You are wrong. In a few weeks You are blown off course by a hurricane and end up lost at sea.", "styled_texts": [], "bg_image": "slides/narvaez/page_09.jpg", "images": [{"b64": "https://media.tenor.com/4t8g4q3M4UAAAAM/el-dorado-road-to-miguel.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1"}], "color": "#D35400"}, {"id": "slide_9", "type": "decision", "title": "", "body": "You follow his plan and he leads you into waters that are low this season. All four of your ships run aground meaning they are stuck on the sand near the shore.", "styled_texts": [], "bg_image": "slides/narvaez/page_10.jpg", "images": [], "buttons": [{"text": "Wait for spring to come and the water to rise", "target": "slide_11"}, {"text": "Go on shore and try to get new ships", "target": "slide_10"}], "color": "#D35400"}, {"id": "slide_10", "type": "gameover", "title": "It's tough to be a god…", "body": "Narváez landed in Florida looking for gold. He found a swamp. 300 men entered. Four came out.\n\nNot surprisingly nobody is willing to give you any money at this point. Your voyage has been nothing but failure. Give up, go home.", "styled_texts": [], "bg_image": "slides/narvaez/page_11.jpg", "images": [{"b64": "https://media.tenor.com/4t8g4q3M4UAAAAM/el-dorado-road-to-miguel.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1"}], "color": "#D35400"}, {"id": "slide_11", "type": "story", "title": "", "body": "The guide tells you this time it is best to sail from Havana (nanana). Unfortunately, on the way a huge storm blows your ships off course and out into the middle of the gulf of mexico. You're not lost, but you're sure stuck. You sail in circles for nearly a month before finally spotting Florida. You hope...", "styled_texts": [], "bg_image": "slides/narvaez/page_12.jpg", "images": [], "buttons": [{"text": "Go on Shore", "target": "slide_12"}], "color": "#D35400"}, {"id": "slide_12", "type": "decision", "title": "", "body": "On shore you find a small native village. They don't look particularly powerful.", "styled_texts": [], "bg_image": "slides/narvaez/page_13.jpg", "images": [], "buttons": [{"text": "Threaten them", "target": "slide_13"}, {"text": "Trade peacefully", "target": "slide_13"}], "color": "#D35400"}, {"id": "slide_13", "type": "story", "title": "", "body": "They seem to be willing to go along with whatever you say. You announce that they must convert to christianity or be killed. They beg you to allow them to keep their language and beliefs. You're not interested. You Take over the village and force them to convert.", "styled_texts": [], "bg_image": "slides/narvaez/page_14.jpg", "images": [], "buttons": [{"text": "Continue North", "target": "slide_14"}], "color": "#D35400"}, {"id": "slide_14", "type": "decision", "title": "", "body": "Florida is much larger than you expected and you're running low on supplies again. You suggest splitting into two groups - one to search on land the other to search by sea. One of your captains speaks up saying it is a terrible idea. THe rest love it.", "styled_texts": [], "bg_image": "slides/narvaez/page_15.jpg", "images": [], "buttons": [{"text": "Divide your crew", "target": "slide_16"}, {"text": "Stay Together", "target": "slide_15"}], "color": "#D35400"}, {"id": "slide_15", "type": "story", "title": "stay", "body": "You decide to keep your men together. Before long supplies are so low that you have no choice but to give up the search and return to cuba. Your voyage is over. You did make it to florida but didn't find much there. At least you survived!", "styled_texts": [], "bg_image": "slides/narvaez/page_16.jpg", "images": [], "buttons": [{"text": "See what happened", "target": "slide_27"}], "color": "#D35400"}, {"id": "slide_16", "type": "decision", "title": "", "body": "You lead the land crew. You find a village and violently force them to give you food. They tell you a much wealthier tribe lives to the north. You return to the coast to join your ships but they are nowhere to be seen.", "styled_texts": [], "bg_image": "slides/narvaez/page_17.jpg", "images": [], "buttons": [{"text": "Wait for the ships to return", "target": "slide_17"}, {"text": "March north through land", "target": "slide_18"}], "color": "#D35400"}, {"id": "slide_17", "type": "story", "title": "", "body": "Marching through unknown lands seems like a bad idea. You head to the beach to wait for your ships. And you wait. And wait. And wait. They never show up and your food is low again. You decide to march north after all.", "styled_texts": [], "bg_image": "slides/narvaez/page_18.jpg", "images": [], "buttons": [{"text": "Go North", "target": "slide_18"}], "color": "#D35400"}, {"id": "slide_18", "type": "decision", "title": "", "body": "You march north and find a town with about 40 houses from the apalachee tribe. This is by far the largest native town you've seen.  So far they don't seem to notice that you are here.", "styled_texts": [], "bg_image": "slides/narvaez/page_19.jpg", "images": [], "buttons": [{"text": "Attack the town", "target": "slide_19"}, {"text": "Scout further north", "target": "slide_20"}], "color": "#D35400"}, {"id": "slide_19", "type": "story", "title": "", "body": "The surprise attack works. You easily take the town. You find plenty of Food but no goold. Oh well, this should make a nice camp at least.", "styled_texts": [], "bg_image": "slides/narvaez/page_20.jpg", "images": [], "buttons": [{"text": "Set up Camp here", "target": "slide_21"}], "color": "#D35400"}, {"id": "slide_20", "type": "gameover", "title": "It's tough to be a god…", "body": "Narváez landed in Florida looking for gold. He found a swamp. 300 men entered. Four came out.\n\nYou head further north, convinced even larger, richer towns await. You find nothing. By the time you turn around to head back the natives have discovered you.", "styled_texts": [], "bg_image": "slides/narvaez/page_21.jpg", "images": [{"b64": "https://media.tenor.com/4t8g4q3M4UAAAAM/el-dorado-road-to-miguel.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1"}], "color": "#D35400"}, {"id": "slide_21", "type": "decision", "title": "", "body": "A couple days later the natives launch a surprise attack. They shoot flaming arrows at the houses your men are living in. When the men run out archers are waiting to shoot them. Many of your men die but you  manage to fight the attackers off with your superior weapons.", "styled_texts": [], "bg_image": "slides/narvaez/page_22.jpg", "images": [], "buttons": [{"text": "Go after them", "target": "slide_22"}, {"text": "Build up your Defenses", "target": "slide_23"}], "color": "#D35400"}, {"id": "slide_22", "type": "story", "title": "", "body": "You go after them now convinced they must have a larger city they are protecting. You soon find yourself wading through deep swamps. The travel is slow and dangerous. The natives take advantage and attack. You survive with heavy losses and decide it is time to get out of florida.", "styled_texts": [], "bg_image": "slides/narvaez/page_23.jpg", "images": [], "buttons": [{"text": "Flee to the coast", "target": "slide_23"}], "color": "#D35400"}, {"id": "slide_23", "type": "story", "title": "", "body": "You build up your defenses but soon realize the natives must be protecting a larger, wealthier city. You decide to go search for it and soon find yourself wading through deep swamps. The travel is slow and dangerous. The natives take advantage and attack. You survive with heavy losses and decide it is time to get out of florida.", "styled_texts": [], "bg_image": "slides/narvaez/page_24.jpg", "images": [], "buttons": [{"text": "Flee to the coast", "target": "slide_24"}], "color": "#D35400"}, {"id": "slide_24", "type": "decision", "title": "", "body": "You make it to the coast. Many of your men are starving, sick or dead. They're so desperate they've started eating their horses. You have no ships. What will you do?", "styled_texts": [], "bg_image": "slides/narvaez/page_25.jpg", "images": [], "buttons": [{"text": "Build rafts and try to float to cuba", "target": "slide_26"}, {"text": "Build signal fires and wait for your ships to find you", "target": "slide_25"}], "color": "#D35400"}, {"id": "slide_25", "type": "gameover", "title": "It's tough to be a god…", "body": "Narváez landed in Florida looking for gold. He found a swamp. 300 men entered. Four came out.\n\nAngry Natives\nThe natives see the signal fires. They come after you, capture you, and kil you.", "styled_texts": [], "bg_image": "slides/narvaez/page_26.jpg", "images": [{"b64": "https://media.tenor.com/4t8g4q3M4UAAAAM/el-dorado-road-to-miguel.gif", "fullscreen": true}], "buttons": [{"text": "Try Again", "target": "slide_1"}], "color": "#D35400"}, {"id": "slide_26", "type": "reveal", "title": "", "body": "Your raft drifts off into sea and you are never seen again. 86 of your men make it to land where they are captured by natives. Only 4 of them ever escape to return to cuba.\nSee what Really happened", "styled_texts": [], "bg_image": "slides/narvaez/page_27.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_27"}], "color": "#D35400"}, {"id": "slide_27", "type": "info", "title": "", "body": "What Really Happened?\n\nThe Narvaez Expedition is known as one of history's great failures. They did reach Florida but were quickly chased out by natives. After splitting up with their ships they had to build their own rafts to try to sail back home. Most of the rafts were never seen again. One reached what is today Texas where the men were captured and enslaved. Four, including Alvar Nunez Cabeza de Vaca who wrote a book detailing the horror of the voyage, escaped and walked all the way through Mexico to reach the safety of the Spanish colonies.\nReload Personality Analyzer", "styled_texts": [], "bg_image": "slides/narvaez/page_28.jpg", "images": [], "buttons": [{"text": "Back to Hub", "target": "HOME"}], "color": "#D35400"}];
let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        audioUnlocked = true;
    } catch(e) {}
}
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

// Button sound system (synthesized - no copyright)
const _actx = new (window.AudioContext || window.webkitAudioContext)();
function playButtonClick() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.frequency.value = 600; osc.type = 'sine';
        gain.gain.value = 0.15;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.15);
        osc.stop(_actx.currentTime + 0.15);
    } catch(e) {}
}
function playDecisionClick() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.frequency.value = 440; osc.type = 'triangle';
        gain.gain.value = 0.12;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(220, _actx.currentTime + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.3);
        osc.stop(_actx.currentTime + 0.3);
    } catch(e) {}
}
function playCorrectChime() {
    try {
        [523, 659, 784].forEach((freq, i) => {
            const osc = _actx.createOscillator();
            const gain = _actx.createGain();
            osc.connect(gain); gain.connect(_actx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.08;
            osc.start(_actx.currentTime + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + i * 0.12 + 0.2);
            osc.stop(_actx.currentTime + i * 0.12 + 0.2);
        });
    } catch(e) {}
}
function playGameOverBuzz() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.type = 'sawtooth'; osc.frequency.value = 200;
        gain.gain.value = 0.15;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(60, _actx.currentTime + 0.6);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.6);
        osc.stop(_actx.currentTime + 0.6);
    } catch(e) {}
}

function goToSlide(id) {
    if (!id) return;
    if (id === 'HOME') {
        window.location.href = 'analyzer.html';
        return;
    }
    const slide = SLIDES.find(s => s.id === id);
    if (!slide) return;

    // Play sounds based on slide type
    if (slide.type === 'gameover') {
        playGameOverBuzz();
    } else if (slide.type === 'decision') {
        playDecisionClick();
    } else if (slide.type === 'reveal') {
        playCorrectChime();
    } else {
        playButtonClick();
    }

    document.querySelectorAll('.slide.active').forEach(el => {
        el.classList.remove('active');
        setTimeout(() => el.style.display = 'none', 600);
    });

    const music = document.getElementById('bg-music');
    if (music && music.paused) {
        music.volume = 0;
        music.play().then(() => {
            let vol = 0;
            const fadeIn = setInterval(() => {
                vol += 0.02;
                if (vol >= 0.2) { music.volume = 0.2; clearInterval(fadeIn); }
                else { music.volume = vol; }
            }, 100);
        }).catch(() => {});
    }

    if (slide.type === 'gameover') {
        // Pause music and play game over sound
        if (music && !music.paused) music.pause();
        const goSound = document.getElementById('gameover-sound');
        if (goSound) {
            goSound.currentTime = 0;
            goSound.volume = 0.6;
            setTimeout(() => goSound.play().catch(() => {}), 300);
        }
    } else {
        // Resume music on non-gameover slides
        if (music && music.paused && music.currentTime > 0) {
            music.volume = 0.2;
            music.play().catch(() => {});
        }
    }

    const el = document.createElement('div');
    el.className = 'slide ' + slide.type + '-slide';

    let html = '';
    const hasBg = !!slide.bg_image;
    if (hasBg) {
        html += '<div class="slide-bg" style="background-image:url(' + slide.bg_image + ')"></div>';
    } else {
        // Dark themed background for slides without images
        html += '<div class="slide-bg" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);"></div>';
    }

    html += '<div class="slide-content">';
    if (slide.title) {
        html += '<div class="slide-title">' + slide.title + '</div>';
    }
    // Render text blocks with original PPTX styles
    if (slide.styled_texts && slide.styled_texts.length > 0) {
        slide.styled_texts.forEach((block, idx) => {
            const css = block.css || '';
            // Each text block is its own positioned element with original PPTX styling
            html += '<div class="pptx-text reveal-hidden" style="' + css + '; z-index: 1; padding: 1.5vh 2vw; box-sizing: border-box;" data-idx="' + idx + '">' + block.text + '</div>';
        });
    } else if (slide.body) {
        // Fallback: plain body text
        const boxClass = hasBg ? 'text-box' : 'text-box text-box-dark';
        html += '<div class="' + boxClass + ' reveal-hidden">' + slide.body + '</div>';
    }
    html += '</div>';

    if (slide.images && slide.images.length > 0) {
        slide.images.forEach(img => {
            if (typeof img === 'object' && img.fullscreen) {
                // Fullscreen GIF — large, centered
                html += '<img src="' + img.b64 + '" class="fullscreen-gif reveal-hidden">';
            } else if (typeof img === 'object' && img.large) {
                // Large positioned image — preserved from PPTX position
                html += '<img src="' + img.b64 + '" class="reveal-hidden" style="position:absolute; left:' + img.left_pct + '%; top:' + img.top_pct + '%; width:' + img.width_pct + '%; height:' + (img.height_pct || 'auto') + (img.height_pct ? '%' : '') + '; z-index:1; object-fit:contain;">';
            } else {
                // Regular accent image
                const src = typeof img === 'object' ? img.b64 : img;
                html += '<img src="' + src + '" class="reveal-hidden" style="position:absolute; right:2vw; top:10vh; max-width:30vw; max-height:40vh; z-index:2; border-radius:8px;">';
            }
        });
    }

    html += '<div class="buttons reveal-hidden">';
    slide.buttons.forEach(btn => {
        html += '<button class="btn" onclick="goToSlide(\'' + btn.target + '\')">' + btn.text + '</button>';
    });
    html += '</div>';

    el.innerHTML = html;
    document.getElementById('game').appendChild(el);

    const textLines = el.querySelectorAll('.pptx-text, .text-line');
    const accentImgs = el.querySelectorAll('img.reveal-hidden');
    const btnsEl = el.querySelector('.buttons');

    if (slide.type === 'gameover') {
        // Game over: show everything immediately
        textLines.forEach(l => l.classList.add('revealed'));
        accentImgs.forEach(i => i.classList.add('revealed'));
        if (btnsEl) btnsEl.classList.add('revealed');
    } else {
        // Line-by-line reveal with 2 second delay
        const delay = 2000;
        textLines.forEach((line, idx) => {
            setTimeout(() => line.classList.add('revealed'), (idx + 1) * delay);
        });
        accentImgs.forEach((img, idx) => {
            setTimeout(() => img.classList.add('revealed'), (textLines.length / 2 + idx) * delay);
        });
        const btnDelay = (textLines.length + 1) * delay + (slide.type === 'decision' ? 2500 : 1500);
        setTimeout(() => { if (btnsEl) btnsEl.classList.add('revealed'); }, btnDelay);
    }

    requestAnimationFrame(() => {
        el.style.display = 'flex';
        requestAnimationFrame(() => el.classList.add('active'));
    });
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

window.addEventListener('load', () => {
    if (SLIDES.length > 0) goToSlide(SLIDES[0].id);
});
</script>

<script>
// Issue #7: Suppress synthetic gameover buzz when external MP3 exists
(function() {
  if (typeof window.playGameOverBuzz === 'function') {
    var orig = window.playGameOverBuzz;
    window.playGameOverBuzz = function() {
      if (document.getElementById('gameover-sound')) return;  // MP3 will play instead
      try { orig(); } catch(e) {}
    };
  }
  // Also: if we have an external bg-music + the engine started a fadeIn interval
  // before the user clicked into a gameover, ensure the music actually pauses.
  // Watch for type=gameover slides being shown and force-pause bg-music.
  var observer = new MutationObserver(function(muts) {
    for (var i = 0; i < muts.length; i++) {
      var added = muts[i].addedNodes;
      for (var j = 0; j < added.length; j++) {
        var n = added[j];
        if (n.nodeType === 1 && n.classList && n.classList.contains('gameover-slide')) {
          var bg = document.getElementById('bg-music');
          if (bg && !bg.paused) {
            try { bg.pause(); bg.volume = 0; } catch(e) {}
          }
        }
      }
    }
  });
  if (document.getElementById('game')) {
    observer.observe(document.getElementById('game'), { childList: true });
  }
})();
</script>

<style>

  top: 8vh; left: 50%;

  width: 70vw;
  max-width: 900px;
  aspect-ratio: 16/9;

  box-shadow: 0 8px 30px rgba(0,0,0,0.7);
}
.yt-overlay iframe {
  width: 100%; height: 100%; border: 0;
}
.yt-overlay .yt-label {
  position: absolute;
  top: -3vh; left: 0;
  font-family: 'Bangers', Arial, sans-serif;
  font-size: clamp(0.8rem, 1.2vw, 1.1rem);
  color: #c9a14a;
  letter-spacing: 1px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
}
</style>
<script>
(function() {
  if (typeof window.goToSlide !== 'function') return;
  var _origGoToSlide = window.goToSlide;
  window.goToSlide = function(id) {
    // Tear down any existing YT iframe before navigating
    document.querySelectorAll('.yt-overlay').forEach(function(el){ el.remove(); });
    var bg = document.getElementById('bg-music');
    if (bg) bg.muted = false;

    _origGoToSlide(id);

    if (id === 'HOME' || (id || '').endsWith('.html')) return;
    if (typeof SLIDES === 'undefined') return;
    var slide = SLIDES.find(function(s){ return s.id === id; });
    if (!slide || !slide.youtube_embed) return;

    // Render YT overlay
    setTimeout(function() {
      var active = document.querySelector('.slide.active');
      if (!active) return;
      var ov = document.createElement('div');
      ov.className = 'yt-overlay';
      ov.innerHTML =
        '<div class="yt-label">▶ Play before continuing</div>' +
        '<iframe src="https://www.youtube.com/embed/' + slide.youtube_embed + '?autoplay=1&rel=0&modestbranding=1" ' +
        'allow="autoplay; encrypted-media" allowfullscreen></iframe>';
      active.appendChild(ov);
      if (bg) bg.muted = true;
    }, 100);
  };
})();
</script>

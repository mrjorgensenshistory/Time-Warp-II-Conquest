<head>

<title>Time Warp - Columbus (Tutorial)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    color: white;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}
.slide {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
    flex-direction: column;
}
.slide.active {
    display: flex;
    opacity: 1;
}
.slide-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 0;
}
.slide-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.15);
}
.slide-content {
    position: relative;
    z-index: 1;
    padding: 1vh 1vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-end;
    max-width: 100%;
}
/* Text box: solid white — matching PPTX Bangers font style */
.text-box {
    background: #fff;
    border: 2px solid #000;
    padding: 2vh 2.5vw;
    margin: 1vh 1vw 1vh auto;
    max-width: 50%;
    color: #000;
    font-size: clamp(1rem, 1.7vw, 1.3rem);
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-weight: normal;
    line-height: 1.5;
    letter-spacing: 0.5px;
}
/* Dark theme text box - slides WITHOUT background images */
.text-box-dark {
    background: transparent !important;
    border: none !important;
    color: #e0e0e0 !important;
    font-style: normal !important;
    text-transform: none !important;
    font-size: clamp(1rem, 1.8vw, 1.3rem) !important;
    line-height: 1.8 !important;
    max-width: 85% !important;
    margin: 2vh auto !important;
    text-align: center !important;
    padding: 3vh 4vw !important;
}
.text-box-dark .text-line {
    color: #e0e0e0;
}
/* PPTX-extracted positioned text blocks */
.pptx-text {
    line-height: 1.4;
    word-wrap: break-word;
    overflow: hidden;
}
.text-line {
    margin-bottom: 0.5em;
}
.reveal-hidden {
    opacity: 0 !important;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal-hidden.revealed {
    opacity: 1 !important;
    transform: translateY(0);
}
.slide-title {
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-weight: bold;
    margin-bottom: 1.5vh;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);

.accent-images {

    right: 3vw;
    top: 12vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}
.accent-images img {
    max-width: 30vw;
    max-height: 35vh;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.fullscreen-gif {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    max-width: 80vw;
    max-height: 70vh;
    border-radius: 8px;

.buttons {

    bottom: 2vh;
    left: 50%;

    text-align: center;
    letter-spacing: 0.5px;
}
.btn:hover {

    transform: scale(1.02);
}
.gameover-slide .slide-title {
    color: #ff3333;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-align: center;
    animation: shake 0.5s ease;
}
.gameover-slide .btn {
    background: #cc0000;
    border-color: #cc0000;
    color: #fff;
}
.gameover-slide .btn:hover {
    background: #ff3333;
}
#fullscreen-btn {

    top: 1vh; right: 1vw;

    cursor: pointer;
    opacity: 0.5;
}
#fullscreen-btn:hover { opacity: 1; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}
</style>
</head>

enor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif", "fullscreen": true}], "buttons": [{"text": "Try Again", "target": "slide_4"}], "color": "#D4AF37"}, {"id": "slide_11", "type": "story", "title": "", "body": "You decide to try your luck with Spain. They certainly aren't the most powerful nation in Europe but maybe that will make them more open to hearing your plan.", "styled_texts": [], "bg_image": "slides/columbus/page_12.jpg", "images": [], "buttons": [{"text": "Visit the Palace", "target": "slide_12"}], "color": "#D4AF37"}, {"id": "slide_12", "type": "decision", "title": "", "body": "You approach the palace of King Ferdinand and Queen Isabella. The king seems very busy and may not be in the mood to hear your story. He is the king though. Speaking with the queen might just be a waste of time. What will you do?", "styled_texts": [], "bg_image": "slides/columbus/page_13.jpg", "images": [], "buttons": [{"text": "Approach the king", "target": "slide_13"}, {"text": "Approach the queen", "target": "slide_17"}], "color": "#D4AF37"}, {"id": "slide_13", "type": "decision", "title": "", "body": "You meet the king and tell him your plan. As you explain the high cost it will require the queen seems upset. The king at least listens to your plan. Now he has something to say.", "styled_texts": [], "bg_image": "slides/columbus/page_14.jpg", "images": [], "buttons": [{"text": "Hear his response", "target": "slide_15"}, {"text": "Try to explain your plan better", "target": "slide_14"}], "color": "#D4AF37"}, {"id": "slide_14", "type": "gameover", "title": "WRONG LEVERRRR!", "body": "Columbus made a poor call. The voyage is over.\n\nThe king's face quickly turns angry. He is insulted that you think he doesn't understand your plan. The last words you hear before his guards drag you away are \"I'M NO FOOL MR. COLUMBUS!\"\n\nYou have failed.", "styled_texts": [], "bg_image": "slides/columbus/page_15.jpg", "images": [{"b64": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif", "fullscreen": true}], "buttons": [{"text": "Try Again", "target": "slide_15"}], "color": "#D4AF37"}, {"id": "slide_15", "type": "decision", "title": "", "body": "The king explains that he would love to support you but he simply cannot spare the gold. Recent wars have cost spain a lot of money. Maybe you can try again in a couple years.", "styled_texts": [], "bg_image": "slides/columbus/page_16.jpg", "images": [], "buttons": [{"text": "Secretly Visit the Queen", "target": "slide_17"}, {"text": "Give up", "target": "slide_16"}], "color": "#D4AF37"}, {"id": "slide_16", "type": "gameover", "title": "WRONG LEVERRRR!", "body": "Columbus made a poor call. The voyage is over.\n\nNo one can blame you for giving up. You tried at least. But still, it is kind of disappointing.", "styled_texts": [], "bg_image": "slides/columbus/page_17.jpg", "images": [{"b64": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif", "fullscreen": true}], "buttons": [{"text": "Try Again", "target": "slide_5"}], "color": "#D4AF37"}, {"id": "slide_17", "type": "decision", "title": "", "body": "The queen is very excited to hear your plan. She sees a great opportunity for spain. Unfortunately, she tells you that as much as she wants to help you - she can't. Only her husband can decide how to spend the nation's gold.", "styled_texts": [], "bg_image": "slides/columbus/page_18.jpg", "images": [], "buttons": [{"text": "Promise you'll pay her back - and more!", "target": "slide_18"}, {"text": "Promise to spread the Catholic Faith", "target": "slide_19"}], "color": "#D4AF37"}, {"id": "slide_18", "type": "story", "title": "", "body": "As you speak you see her eyes begin to sparkle - you can almost imagine the dollar signs dancing in her head! Still, she is hesitating. She still needs more convincing.", "styled_texts": [], "bg_image": "slides/columbus/page_19.jpg", "images": [], "buttons": [{"text": "Promise to spread the Catholic Faith", "target": "slide_19"}], "color": "#D4AF37"}, {"id": "slide_19", "type": "story", "title": "", "body": "The promise of spreading god's word (well, and the money…) is enough to convince Ferdinand and Isabella that the Voyage is worth the risk.\n\nYou are given 3 ships, a crew and a charter to be governor of all new lands you discover.", "styled_texts": [], "bg_image": "slides/columbus/page_20.jpg", "images": [], "buttons": [{"text": "Meet your crew", "target": "slide_20"}], "color": "#D4AF37"}, {"id": "slide_20", "type": "story", "title": "", "body": "Your crew is a group of hearty Sailors. They know their way around a ship but none of them are particularly skilled. They've signed on for one month. They expect to be home by then and plenty rich.", "styled_texts": [], "bg_image": "slides/columbus/page_21.jpg", "images": [], "buttons": [{"text": "Check out Your Ships", "target": "slide_21"}], "color": "#D4AF37"}, {"id": "slide_21", "type": "story", "title": "", "body": "Your ships are only somewhat more impressive than your crew. The two smaller ships, the nina and the pinta, are modern designs and should move well in the ocean. The Santa Maria though is older and looks like she'll be slow.", "styled_texts": [], "bg_image": "slides/columbus/page_22.jpg", "images": [], "buttons": [{"text": "Begin your voyage", "target": "slide_22"}], "color": "#D4AF37"}, {"id": "slide_22", "type": "decision", "title": "", "body": "After only a week at sea you manage to break the rudder on the Pinta by sailing too close to an island shore. What will you do?", "styled_texts": [], "bg_image": "slides/columbus/page_23.jpg", "images": [], "buttons": [{"text": "Continue on without it", "target": "slide_23"}, {"text": "Turn back for a new ship", "target": "slide_24"}, {"text": "Stop at the island to fix it", "target": "slide_25"}], "color": "#D4AF37"}, {"id": "slide_23", "type": "gameover", "title": "WRONG LEVERRRR!", "body": "Columbus made a poor call. The voyage is over.\n\nYou decide to go on without the rudder. What's it ade a poor call. The voyage is over.", "styled_texts": [], "bg_image": "slides/columbus/page_31.jpg", "images": [{"b64": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif", "fullscreen": true}], "buttons": [{"text": "Try Again", "target": "slide_5"}], "color": "#D4AF37"}, {"id": "slide_31", "type": "story", "title": "", "body": "They seem peaceful and eager to trade! You now have plenty of gold to return home with a profit but first you want to explore this new land you've found.", "styled_texts": [], "bg_image": "slides/columbus/page_32.jpg", "images": [], "buttons": [{"text": "Explore the islands", "target": "slide_32"}], "color": "#D4AF37"}, {"id": "slide_32", "type": "decision", "title": "", "body": "While you are exploring the islands you hit a rock and seriously damage the santa maria. Without it You'd only have your two small ships left and wouldn't have enough room to get all your men home. What will you do?", "styled_texts": [], "bg_image": "slides/columbus/page_33.jpg", "images": [], "buttons": [{"text": "Leave some men behind & return to europe for a new ship", "target": "slide_34"}, {"text": "Repair the ship as best you can and sail home immediately", "target": "slide_33"}], "color": "#D4AF37"}, {"id": "slide_33", "type": "gameover", "title": "WRONG LEVERRRR!", "body": "Columbus made a poor call. The voyage is over.\n\nSailing into unknown waters may be exciting but it is dangerous. Two weeks later you find yourself lost at sea. You and your crew are never heard from again - just like so many others.", "styled_texts": [], "bg_image": "slides/columbus/page_34.jpg", "images": [{"b64": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_5"}], "color": "#D4AF37"}, {"id": "slide_34", "type": "story", "title": "", "body": "Your men are happy to stay behind on the island paradise. When you return The king and queen are so amazed by what you've let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        audioUnlocked = true;
    } catch(e) {}
}
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

            osc.frequency.value = freq;
            gain.gain.value = 0.08;
            osc.start(_actx.currentTime + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + i * 0.12 + 0.2);
            osc.stop(_actx.currentTime + i * 0.12 + 0.2);
        });
    } catch(e) {}
}
function playGameOverBuzz() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.type = 'sawtooth'; osc.frequency.value = 200;
        gain.gain.value = 0.15;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(60, _actx.currentTime + 0.6);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.6);
        osc.stop(_actx.currentTime + 0.6);
    } catch(e) {}
}

function goToSlide(id) {
    /* TW2-EXT-HTML-TARGET */
    if (typeof id === 'string' && id.endsWith('.html')) { window.location.href = id; return; }
    if (!id) return;
    if (id === 'HOME') {
        window.location.href = 'analyzer.html';
        return;
    }
    const slide = SLIDES.find(s => s.id === id);
    if (!slide) return;

    // Play sounds based on slide type
    if (slide.type === 'gameover') {
        playGameOverBuzz();
    } else if (slide.type === 'decision') {
        playDecisionClick();
    } else if (slide.type === 'reveal') {
        playCorrectChime();
    } else {
        playButtonClick();
    }

    document.querySelectorAll('.slide.active').forEach(el => {
        el.classList.remove('active');
        setTimeout(() => el.style.display = 'none', 600);
    });

    const music = document.getElementById('bg-music');
    if (music && music.paused) {
        music.volume = 0;
        music.play().then(() => {
            let vol = 0;
            const fadeIn = setInterval(() => {
                vol += 0.02;
                if (vol >= 0.2) { music.volume = 0.2; clearInterval(fadeIn); }
                else { music.volume = vol; }
            }, 100);
        }).catch(() => {});
    }

    if (slide.type === 'gameover') {
        // Pause music and play game over sound
        if (music && !music.paused) music.pause();
        const goSound = document.getElementById('gameover-sound');
        if (goSound) {
            goSound.currentTime = 0;
            goSound.volume = 0.6;
            setTimeout(() => goSound.play().catch(() => {}), 300);
        }
    } else {
        // Resume music on non-gameover slides
        if (music && music.paused && music.currentTime > 0) {
            music.volume = 0.2;
            music.play().catch(() => {});
        }
    }

    const el = document.createElement('div');
    el.className = 'slide ' + slide.type + '-slide';

    let html = '';
    const hasBg = !!slide.bg_image;
    if (hasBg) {
        html += '<div class="slide-bg" style="background-image:url(' + slide.bg_image + ')"></div>';
    } else {
        // Dark themed background for slides without images
        html += '<div class="slide-bg" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);"></div>';
    }

    html += '<div class="slide-content">';
    if (slide.title) {
        html += '<div class="slide-title">' + slide.title + '</div>';
    }
    // Render text blocks with original PPTX styles
    if (slide.styled_texts && slide.styled_texts.length > 0) {
        slide.styled_texts.forEach((block, idx) => {
            const css = block.css || '';
            // Each text block is its own positioned element with original PPTX styling
            html += '<div class="pptx-text reveal-hidden" style="' + css + '; z-index: 1; padding: 1.5vh 2vw; box-sizing: border-box;" data-idx="' + idx + '">' + block.text + '</div>';
        });
    } else if (slide.body) {
        // Fallback: plain body text
        const boxClass = hasBg ? 'text-box' : 'text-box text-box-dark';
        html += '<div class="' + boxClass + ' reveal-hidden">' + slide.body + '</div>';
    }
    html += '</div>';

    if (slide.images && slide.images.length > 0) {
        slide.images.forEach(img => {
            if (typeof img === 'object' && img.fullscreen) {
                // Fullscreen GIF — large, centered
                html += '<img src="' + img.b64 + '" class="fullscreen-gif reveal-hidden">';
            } else if (typeof img === 'object' && img.large) {
                // Large positioned image — preserved from PPTX position
                html += '<img src="' + img.b64 + '" class="reveal-hidden" style="position:absolute; left:' + img.left_pct + '%; top:' + img.top_pct + '%; width:' + img.width_pct + '%; height:' + (img.height_pct || 'auto') + (img.height_pct ? '%' : '') + '; z-index:1; object-fit:contain;">';
            } else {
                // Regular accent image
                const src = typeof img === 'object' ? img.b64 : img;
                html += '<img src="' + src + '" class="reveal-hidden" style="position:absolute; right:2vw; top:10vh; max-width:30vw; max-height:40vh; z-index:2; border-radius:8px;">';
            }
        });
    }

    html += '<div class="buttons reveal-hidden">';
    slide.buttons.forEach(btn => {
        html += '<button class="btn" onclick="goToSlide(\'' + btn.target + '\')">' + btn.text + '</button>';
    });
    html += '</div>';

    el.innerHTML = html;
    document.getElementById('game').appendChild(el);

    const textLines = el.querySelectorAll('.pptx-text, .text-line');
    const accentImgs = el.querySelectorAll('img.reveal-hidden');
    const btnsEl = el.querySelector('.buttons');

    if (slide.type === 'gameover') {
        // Game over: show everything immediately
        textLines.forEach(l => l.classList.add('revealed'));
        accentImgs.forEach(i => i.classList.add('revealed'));
        if (btnsEl) btnsEl.classList.add('revealed');
    } else {
        // Line-by-line reveal with 2 second delay
        const delay = 2000;
        textLines.forEach((line, idx) => {
            setTimeout(() => line.classList.add('revealed'), (idx + 1) * delay);
        });
        accentImgs.forEach((img, idx) => {
            setTimeout(() => img.classList.add('revealed'), (textLines.length / 2 + idx) * delay);
        });
        const btnDelay = (textLines.length + 1) * delay + (slide.type === 'decision' ? 2500 : 1500);
        setTimeout(() => { if (btnsEl) btnsEl.classList.add('revealed'); }, btnDelay);
    }

    requestAnimationFrame(() => {
        el.style.display = 'flex';
        requestAnimationFrame(() => el.classList.add('active'));
    });
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

window.addEventListener('load', () => {
    if (SLIDES.length > 0) goToSlide(SLIDES[0].id);
});
</script>

<script>
// Issue #7: Suppress synthetic gameover buzz when external MP3 exists
(function() {
  if (typeof window.playGameOverBuzz === 'function') {
    var orig = window.playGameOverBuzz;
    window.playGameOverBuzz = function() {
      if (document.getElementById('gameover-sound')) return;  // MP3 will play instead
      try { orig(); } catch(e) {}
    };
  }
  // Also: if we have an external bg-music + the engine started a fadeIn interval
  // before the user clicked into a gameover, ensure the music actually pauses.
  // Watch for type=gameover slides being shown and force-pause bg-music.
  var observer = new MutationObserver(function(muts) {
    for (var i = 0; i < muts.length; i++) {
      var added = muts[i].addedNodes;
      for (var j = 0; j < added.length; j++) {
        var n = added[j];
        if (n.nodeType === 1 && n.classList && n.classList.contains('gameover-slide')) {
          var bg = document.getElementById('bg-music');
          if (bg && !bg.paused) {
            try { bg.pause(); bg.volume = 0; } catch(e) {}
          }
        }
      }
    }
  });
  if (document.getElementById('game')) {
    observer.observe(document.getElementById('game'), { childList: true });
  }
})();
</script>

(function() {
  if (typeof window.goToSlide !== 'function') return;
  var _origGoToSlide = window.goToSlide;
  window.goToSlide = function(id) {
    // Tear down any existing YT iframe before navigating
    document.querySelectorAll('.yt-overlay').forEach(function(el){ el.remove(); });
    var bg = document.getElementById('bg-music');
    if (bg) bg.muted = false;

    _origGoToSlide(id);

    if (id === 'HOME' || (id || '').endsWith('.html')) return;
    if (typeof SLIDES === 'undefined') return;
    var slide = SLIDES.find(function(s){ return s.id === id; });

    setTimeout(function() {

      if (!active) return;
      var ov = document.createElement('div');
      ov.className = 'yt-overlay';
      ov.innerHTML =

        '<iframe src="https://www.youtube.com/embed/' + slide.youtube_embed + '?autoplay=1&rel=0&modestbranding=1" ' +
        'allow="autoplay; encrypted-media" allowfullscreen></iframe>';
      active.appendChild(ov);
      if (bg) bg.muted = true;
    }, 100);
  };
})();
</script>

<script>
(function() {
  if (typeof window.goToSlide !== 'function') return;
  var prev = window.goToSlide;
  window.goToSlide = function(id) {
    var active = document.querySelector('.slide.active');
    if (active && active.classList.contains('gameover-slide')) {
      var go = document.getElementById('gameover-sound');
      if (go) { try { go.pause(); go.currentTime = 0; } catch(e) {} }
    }
    // Also kill any active YT iframe audio
    document.querySelectorAll('.yt-overlay').forEach(function(el){
      var f = el.querySelector('iframe');
      if (f) { try { f.src = 'about:blank'; } catch(e){} }
      el.remove();
    });
    var bg = document.getElementById('bg-music');
    if (bg) bg.muted = false;
    prev(id);
  };
})();
</script>

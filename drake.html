<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Warp - Sir Francis Drake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    color: white;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}
.slide {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
    flex-direction: column;
}
.slide.active {
    display: flex;
    opacity: 1;
}
.slide-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 0;
}
.slide-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.15);
}
.slide-content {
    position: relative;
    z-index: 1;
    padding: 1vh 1vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-end;
    max-width: 100%;
}
/* Text box: solid white — matching PPTX Bangers font style */
.text-box {
    background: #fff;
    border: 2px solid #000;
    padding: 2vh 2.5vw;
    margin: 1vh 1vw 1vh auto;
    max-width: 50%;
    color: #000;
    font-size: clamp(1rem, 1.7vw, 1.3rem);
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-weight: normal;
    line-height: 1.5;
    letter-spacing: 0.5px;
}
/* Dark theme text box - slides WITHOUT background images */
.text-box-dark {
    background: transparent !important;
    border: none !important;
    color: #e0e0e0 !important;
    font-style: normal !important;
    text-transform: none !important;
    font-size: clamp(1rem, 1.8vw, 1.3rem) !important;
    line-height: 1.8 !important;
    max-width: 85% !important;
    margin: 2vh auto !important;
    text-align: center !important;
    padding: 3vh 4vw !important;
}
.text-box-dark .text-line {
    color: #e0e0e0;
}
/* PPTX-extracted positioned text blocks */
.pptx-text {
    line-height: 1.4;
    word-wrap: break-word;
    overflow: hidden;
}
.text-line {
    margin-bottom: 0.5em;
}
.reveal-hidden {
    opacity: 0 !important;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal-hidden.revealed {
    opacity: 1 !important;
    transform: translateY(0);
}
.slide-title {
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-weight: bold;
    margin-bottom: 1.5vh;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.accent-images {
    position: absolute;
    right: 3vw;
    top: 12vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}
.accent-images img {
    max-width: 30vw;
    max-height: 35vh;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
/* Fullscreen GIFs — displayed large, centered */
.fullscreen-gif {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    max-width: 80vw;
    max-height: 70vh;
    border-radius: 8px;
}
.buttons {
    position: absolute;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 1vh;
    z-index: 3;
    max-width: 55%;
    align-items: center;

.btn {
    background: #fff;
    color: #000;
    border: 2px solid #000;
    border-radius: 0;
    padding: 1.5vh 3vw;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-size: clamp(0.9rem, 1.5vw, 1.15rem);
    font-weight: normal;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 25vw;
    text-align: center;
    letter-spacing: 0.5px;
}
.btn:hover {
    background: #eee;
    transform: scale(1.02);
}
.gameover-slide .slide-title {
    color: #ff3333;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-align: center;
    animation: shake 0.5s ease;
}
.gameover-slide .btn {
    background: #cc0000;
    border-color: #cc0000;
    color: #fff;
}
.gameover-slide .btn:hover {
    background: #ff3333;
}
#fullscreen-btn {
    position: fixed;
    top: 1vh; right: 1vw;
    z-index: 999;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 5px;
    padding: 0.5vh 1vw;

    cursor: pointer;
    opacity: 0.5;

#fullscreen-btn:hover { opacity: 1; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}
</style>
</head>

<script>
const SLIDES = [{"id": "slide_0", "type": "story", "title": "", "body": "Francis Drake\nBorn: 1563\nNation: England\n\nDrake began exploring the New World to help England compete with Spain. While he claimed to be working on his own out of love for his country, many believed the English queen was secretly giving him orders. Whatever the case, he ended up leaving Europe to try to sail around South America.\n\n— Started from the bottom, now we're on a ship 🏴‍☠️", "styled_texts": [], "bg_image": "slides/drake/page_01.jpg", "images": [], "buttons": [{"text": "Time Warp", "target": "slide_1", "pptx_pos": {"left": 42.5, "top": 78.5, "w": 19.6, "h": 7.9}}], "color": "#2980B9"}, {"id": "slide_1", "type": "info", "title": "TIME WARP\n\n\n\nFrancis Drake\n1577", "body": "", "styled_texts": [], "bg_image": "slides/drake/page_02.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_2"}], "color": "#2980B9"}, {"id": "slide_2", "type": "decision", "title": "", "body": "You sail off with five ships and 164 men. Almost immediately after leaving england your six ships face a huge storm on the ocean. Sailing into it would be very dangerous but turning back home may waste more time than you can afford.\n\n— OVO = Old Voyaging Outfit.", "styled_texts": [], "bg_image": "slides/drake/page_03.jpg", "images": [], "buttons": [{"text": "Head Back and Wait", "target": "slide_3", "pptx_pos": {"left": 1.7, "top": 25.4, "w": 32.4, "h": 6.6}}, {"text": "Try to sail through the storm", "target": "slide_4", "pptx_pos": {"left": 65.2, "top": 25.4, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_3", "type": "story", "title": "", "body": "You order your ships to return to england. The men are not happy - you can't get rich sitting in port. HOwever, as they sit on the shore and watching the storm grow even larger, they are forced to admit you made the right decision. You wait for the storm to clear then you try again.", "styled_texts": [], "bg_image": "slides/drake/page_04.jpg", "images": [], "buttons": [{"text": "Return to Sea", "target": "slide_5", "pptx_pos": {"left": 33.8, "top": 25.4, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_4", "type": "gameover", "title": "Started from the bottom, now we're back at the bottom.", "body": "Sir Francis Drake died of dysentery on the voyage home. We are not joking.\n\nShowing courage as captain is the best way to get your crew to support you. Turns out, it is also the best way to get them killed. The storm is far worse than you thought. Your ships are tossed, 2 are sunk, the last two limp back home and your voyage ends.", "styled_texts": [], "bg_image": "slides/drake/page_05.jpg", "images": [{"b64": "https://media.tenor.com/hED6DgiSGCYAAAAM/spongebob-toilet.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1", "pptx_pos": {"left": 40.9, "top": 75.1, "w": 15.1, "h": 11.0}}], "color": "#2980B9"}, {"id": "slide_5", "type": "decision", "title": "", "body": "While sailing south toward africa you notice a large merchant ship. It appears to be loaded with supplies. However, the ship is not from spain. It is portuguese. They are not your enemy but it is a really nice ship...\nEurope\nAfrica\n\n— In my feelings… about the Spanish.", "styled_texts": [], "bg_image": "slides/drake/page_06.jpg", "images": [], "buttons": [{"text": "Capture It", "target": "slide_7", "pptx_pos": {"left": 46.0, "top": 69.3, "w": 32.4, "h": 6.6}}, {"text": "Ignore it and continue", "target": "slide_6", "pptx_pos": {"left": 46.0, "top": 80.3, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_6", "type": "story", "title": "", "body": "Making war with another nation seems like a bad idea so despite the hopes of your men you leave the ship alone. They would have appreciated the riches but you decide it just isn't worth the risk. Plus, you're not pirates… are you?\nEurope\nAfrica", "styled_texts": [], "bg_image": "slides/drake/page_07.jpg", "images": [], "buttons": [{"text": "Cross the atlantic", "target": "slide_8", "pptx_pos": {"left": 46.0, "top": 84.7, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_7", "type": "story", "title": "", "body": "You decide to capture it and add it to your fleet. The captain happens to know alot about south American waters and seems happy to join you when you promise him plenty of Riches. WEll, that worked out. Maybe your luck is changing!\nEurope\nAfrica", "styled_texts": [], "bg_image": "slides/drake/page_08.jpg", "images": [], "buttons": [{"text": "Cross the atlantic", "target": "slide_8", "pptx_pos": {"left": 46.0, "top": 84.7, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_8", "type": "decision", "title": "", "body": "Crossing the ocean proves to be extremely difficult. Along the way you lose so many men to sickness that you're forced to abandon three of your ships. You do finally reach south America and land.  Upon landing one of your men starts talking about removing you as captain.\nSouth America", "styled_texts": [], "bg_image": "slides/drake/page_09.jpg", "images": [], "buttons": [{"text": "Let him Talk", "target": "slide_9", "pptx_pos": {"left": 2.4, "top": 73.7, "w": 35.4, "h": 6.6}}, {"text": "Put him on trial as a witch", "target": "slide_10", "pptx_pos": {"left": 2.4, "top": 81.8, "w": 35.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_9", "type": "gameover", "title": "Started from the bottom, now we're back at the bottom.", "body": "Sir Francis Drake died of dysentery on the voyage home. We are not joking.\n\nHe convinces the men that you are to blame for all their suffering and loss. They throw you overboard. Bummer.", "styled_texts": [], "bg_image": "slides/drake/page_10.jpg", "images": [{"b64": "https://media.tenor.com/hED6DgiSGCYAAAAM/spongebob-toilet.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1", "pptx_pos": {"left": 42.4, "top": 70.6, "w": 15.1, "h": 11.0}}], "color": "#2980B9"}, {"id": "slide_10", "type": "story", "title": "", "body": "After you lead a ridiculous trial against the man you announce that he has been found guilty of witchcraft and you put him to death. Your ship priest blames you for violating the law of god and dooming the voyage. You announce his excommunication and throw him in the ship's jail.\nUh, can you do that?\nI just did.", "styled_texts": [], "bg_image": "slides/drake/page_11.jpg", "images": [], "buttons": [{"text": "Sail around the cape", "target": "slide_11", "pptx_pos": {"left": 2.4, "top": 75.2, "w": 35.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_11", "type": "decision", "title": "", "body": "The waters around the horn are dangerous and many voyages have ended here. While trying to Pass aRound the horn A storm wrecks one of your ships and causes another to sail back to england. You are now Down to just one - the golden hind. As you are struggling to keep your last ship off the rocks you spot a village on land.", "styled_texts": [], "bg_image": "slides/drake/page_12.jpg", "images": [], "buttons": [{"text": "Land at the village", "target": "slide_12", "pptx_pos": {"left": 1.7, "top": 31.3, "w": 32.4, "h": 6.6}}, {"text": "Continue on around the cape", "target": "slide_13", "pptx_pos": {"left": 65.2, "top": 31.3, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_12", "type": "story", "title": "", "body": "You decide to land. The natives are not at all surprised to see you. It seems you are not the first europeans to land here. Unfortunately, these natives have been visited by the spanish before and were not treated well. They attack you thinking you are spanish. You are seriously wounded in the attack but manage to fight them off and hurry back to your ship.", "styled_texts": [], "bg_image": "slides/drake/page_13.jpg", "images": [], "buttons": [{"text": "Return to sea", "target": "slide_14", "pptx_pos": {"left": 65.2, "top": 35.8, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_13", "type": "gameover", "title": "Started from the bottom, now we're back at the bottom.", "body": "Sir Francis Drake died of dysentery on the voyage home. We are not joking.\n\nYou continue on and are hit by a giant storm. Your ship is tossed on the ocean with great force. You try to hold it together but it's too much. You are pushed high on a wave then crash down on a jagged rock. Your ship is destroyed and you and your crew are lost.", "styled_texts": [], "bg_image": "slides/drake/page_14.jpg", "images": [{"b64": "https://media.tenor.com/hED6DgiSGCYAAAAM/spongebob-toilet.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1", "pptx_pos": {"left": 42.4, "top": 72.1, "w": 15.1, "h": 11.0}}], "color": "#2980B9"}, {"id": "slide_14", "type": "decision", "title": "", "body": "Amazingly you manage to make it around the cape and into the calm waters of the pacific. The spanish never thought anyone would make it so they have no idea you're even here. Their ships in these waters are hardly even defended. Their cities are a bit stronger but have far more riches to plunder.", "styled_texts": [], "bg_image": "slides/drake/page_15.jpg", "images": [], "buttons": [{"text": "Attack a town", "target": "slide_16", "pptx_pos": {"left": 64.9, "top": 30.2, "w": 32.4, "h": 6.6}}, {"text": "Attack a ship", "target": "slide_15", "pptx_pos": {"left": 1.7, "top": 30.2, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_15", "type": "story", "title": "", "body": "You spot a spanish ship off the coast of peru. That would make a good target! You pull up alongside and fire your cannons. The crew surrenders immediately. You go on board and take their treasure. You find nearly $9 million in gold coins! Unfortunately, the ship was so damaged in the attack that it must be sunk. Oh well, $9 million is a great start! Just think what a town would bring...\n\n— Hotline Bling? Try Cannon Bling.", "styled_texts": [], "bg_image": "slides/drake/page_16.jpg", "images": [], "buttons": [{"text": "Attack a Town", "target": "slide_18", "pptx_pos": {"left": 0.9, "top": 82.1, "w": 32.5, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_16", "type": "story", "title": "", "body": "I mean we're here - let's go big! You attack to the port town of Valparaiso in Chile. They were not at all ready for your attack. You steal gold from the town and a huge shipment of wine from one of the ships docked in the harbor. What might other ships be carrying?!", "styled_texts": [], "bg_image": "slides/drake/page_17.jpg", "images": [], "buttons": [{"text": "Attack a ship", "target": "slide_17", "pptx_pos": {"left": 65.2, "top": 26.3, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_17", "type": "story", "title": "", "body": "You spot a spanish ship off the coast of peru. That would make a good target! You pull up alongside and fire your cannons. The crew surrenders immediately. You go on board and take their treasure. You find nearly $9 million in gold coins! Unfortunately, the ship was so damaged in the attack that it must be sunk. Oh well, $9 million is a great start!", "styled_texts": [], "bg_image": "slides/drake/page_18.jpg", "images": [], "buttons": [{"text": "Continue pillaging!", "target": "slide_19", "pptx_pos": {"left": 1.7, "top": 79.1, "w": 30.6, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_18", "type": "story", "title": "", "body": "I mean we're here - let's go big! You attack to the port town of Valparaiso in Chile. They were not at all ready for your attack. You steal gold from the town and a huge shipment of wine from one of the ships docked in the harbor. This is going great!", "styled_texts": [], "bg_image": "slides/drake/page_19.jpg", "images": [], "buttons": [{"text": "Continue Pillaging!", "target": "slide_19", "pptx_pos": {"left": 65.2, "top": 26.3, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_19", "type": "decision", "title": "", "body": "In the town you heard rumors of a giant spanish treasure ship - the cacafuego - sailing nearby. If you could take this ship your voyage would be a huge success. You manage to find it out in the open sea. It is far, far larger than your ship and loaded with cannons. Attacking it directly would be very risky.\n\n— God's Plan? More like Queen's Plan.", "styled_texts": [], "bg_image": "slides/drake/page_20.jpg", "images": [], "buttons": [{"text": "Attack before they know you are here", "target": "slide_20", "pptx_pos": {"left": 1.2, "top": 70.2, "w": 31.3, "h": 11.3}}, {"text": "Fly a Spanish flag and try to trick them", "target": "slide_21", "pptx_pos": {"left": 1.2, "top": 83.5, "w": 31.3, "h": 11.3}}], "color": "#2980B9"}, {"id": "slide_20", "type": "gameover", "title": "Started from the bottom, now we're back at the bottom.", "body": "Sir Francis Drake died of dysentery on the voyage home. We are not joking.", "styled_texts": [], "bg_image": "slides/drake/page_21.jpg", "images": [{"b64": "https://media.tenor.com/hED6DgiSGCYAAAAM/spongebob-toilet.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1", "pptx_pos": {"left": 42.4, "top": 70.6, "w": 15.1, "h": 11.0}}], "color": "#2980B9"}, {"id": "slide_21", "type": "story", "title": "", "body": "The trick works! You are able to pull up right alongside the larger ship and they don't fire a single shot. Once you are close enough to demand they surrender. The captain laughs at your tiny ship. So, you shoot all your cannons at once. You blow off the mast so the ship can't move. Soon your men board the ship and take it over with barely a fight.", "styled_texts": [], "bg_image": "slides/drake/page_22.jpg", "images": [], "buttons": [{"text": "Jolly good show chaps!", "target": "slide_22", "pptx_pos": {"left": 1.7, "top": 29.8, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_22", "type": "story", "title": "", "body": "Your continued success makes you greedy for more. You hear of another treasure ship far to the north in the pacific ocean. You know nothing of the waters there but they are beautiful so who cares?", "styled_texts": [], "bg_image": "slides/drake/page_23.jpg", "images": [], "buttons": [{"text": "Continue north in the pacific", "target": "slide_23", "pptx_pos": {"left": 65.2, "top": 29.8, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_23", "type": "decision", "title": "", "body": "After weeks of searching you fail to find the ship. It turns out the ocean is really, really big. You are now very far north and very far from home. You've been gone nearly three years and decide it is time to end the voyage. Will you go back the way you came or try to circumnavigate, sail around, the world and return home that way?", "styled_texts": [], "bg_image": "slides/drake/page_24.jpg", "images": [], "buttons": [{"text": "Try to sail around the world", "target": "slide_25", "pptx_pos": {"left": 65.2, "top": 32.8, "w": 32.4, "h": 6.6}}, {"text": "Follow the same route", "target": "slide_24", "pptx_pos": {"left": 1.7, "top": 32.8, "w": 32.4, "h": 6.6}}], "color": "#2980B9"}, {"id": "slide_24", "type": "reveal", "title": "", "body": "Following the same route means you have to sail through the cape again. This time you don't make it. You hit a rock and your ship sinks. Bummer.\nSee what Really happened\n\n— Best I Ever Had. (The voyage, not the loot.)", "styled_texts": [], "bg_image": "slides/drake/page_25.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_26"}], "color": "#2980B9"}, {"id": "slide_25", "type": "reveal", "title": "", "body": "You've gone this far you might as well go the whole way right? Your crew sails west eventually reaching the indies, then Africa, then you make it home. When you make it back people are shocked to see you. You've been gone three years and they assumed you were long since dead. Nope! You're the man!\nSee what Really happened\n\n— Best I Ever Had. (The voyage, not the loot.)\n\n— Took care of the whole world, on God.", "styled_texts": [], "bg_image": "slides/drake/page_26.jpg", "images": [{"b64": "https://media.tenor.com/o-xhn7XDyckAAAAM/hook-bangarang.gif", "fullscreen": true}], "buttons": [{"text": "Continue", "target": "slide_26"}], "color": "#2980B9"}, {"id": "slide_26", "type": "info", "title": "", "body": "What Really Happened?\n\nDrake successfully, and surprisingly, sailed around South America and started attacking Spanish ships and cities on the west coast. They had no idea he was there before it was too late. After plenty of pillaging and raiding he led his crew back to England making him the first English captain to lead a successful voyage around the world. Back in Europe Spain demanded his arrest as a pirate. England refused and instead made him one of the leaders of the English navy.\nReload Personality Analyzer", "styled_texts": [], "bg_image": "slides/drake/page_27.jpg", "images": [], "buttons": [{"text": "Back to Hub", "target": "HOME"}], "color": "#2980B9"}];
let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        audioUnlocked = true;
    } catch(e) {}
}
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

        osc.frequency.value = 440; osc.type = 'triangle';
        gain.gain.value = 0.12;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(220, _actx.currentTime + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.3);
        osc.stop(_actx.currentTime + 0.3);
    } catch(e) {}
}
function playCorrectChime() {
    try {
        [523, 659, 784].forEach((freq, i) => {
            const osc = _actx.createOscillator();
            const gain = _actx.createGain();
            osc.connect(gain); gain.connect(_actx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.08;
            osc.start(_actx.currentTime + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + i * 0.12 + 0.2);
            osc.stop(_actx.currentTime + i * 0.12 + 0.2);
        });
    } catch(e) {}
}
function playGameOverBuzz() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.type = 'sawtooth'; osc.frequency.value = 200;
        gain.gain.value = 0.15;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(60, _actx.currentTime + 0.6);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.6);
        osc.stop(_actx.currentTime + 0.6);
    } catch(e) {}
}

function goToSlide(id) {
    /* TW2-EXT-HTML-TARGET */
    if (typeof id === 'string' && id.endsWith('.html')) { window.location.href = id; return; }
    if (!id) return;
    if (id === 'HOME') {
        window.location.href = 'analyzer.html';
        return;
    }
    const slide = SLIDES.find(s => s.id === id);
    if (!slide) return;

    // Play sounds based on slide type
    if (slide.type === 'gameover') {
        playGameOverBuzz();
    } else if (slide.type === 'decision') {
        playDecisionClick();
    } else if (slide.type === 'reveal') {
        playCorrectChime();
    } else {
        playButtonClick();
    }

    document.querySelectorAll('.slide.active').forEach(el => {
        el.classList.remove('active');
        setTimeout(() => el.style.display = 'none', 600);
    });

    const music = document.getElementById('bg-music');
    if (music && music.paused) {
        music.volume = 0;
        music.play().then(() => {
            let vol = 0;
            const fadeIn = setInterval(() => {
                vol += 0.02;
                if (vol >= 0.2) { music.volume = 0.2; clearInterval(fadeIn); }
                else { music.volume = vol; }
            }, 100);
        }).catch(() => {});
    }

    if (slide.type === 'gameover') {
        // Pause music and play game over sound
        if (music && !music.paused) music.pause();
        const goSound = document.getElementById('gameover-sound');
        if (goSound) {
            goSound.currentTime = 0;
            goSound.volume = 0.6;
            setTimeout(() => goSound.play().catch(() => {}), 300);
        }
    } else {
        // Resume music on non-gameover slides
        if (music && music.paused && music.currentTime > 0) {
            music.volume = 0.2;
            music.play().catch(() => {});
        }
    }

    const el = document.createElement('div');
    el.className = 'slide ' + slide.type + '-slide';

    let html = '';
    const hasBg = !!slide.bg_image;
    if (hasBg) {
        html += '<div class="slide-bg" style="background-image:url(' + slide.bg_image + ')"></div>';
    } else {
        // Dark themed background for slides without images
        html += '<div class="slide-bg" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);"></div>';
    }

    html += '<div class="slide-content">';
    if (slide.title) {
        html += '<div class="slide-title">' + slide.title + '</div>';
    }
    // Render text blocks with original PPTX styles
    if (slide.styled_texts && slide.styled_texts.length > 0) {
        slide.styled_texts.forEach((block, idx) => {
            const css = block.css || '';
            // Each text block is its own positioned element with original PPTX styling
            html += '<div class="pptx-text reveal-hidden" style="' + css + '; z-index: 1; padding: 1.5vh 2vw; box-sizing: border-box;" data-idx="' + idx + '">' + block.text + '</div>';
        });
    } else if (slide.body) {
        // Fallback: plain body text
        const boxClass = hasBg ? 'text-box' : 'text-box text-box-dark';
        html += '<div class="' + boxClass + ' reveal-hidden">' + slide.body + '</div>';
    }
    html += '</div>';

    if (slide.images && slide.images.length > 0) {
        slide.images.forEach(img => {
            if (typeof img === 'object' && img.fullscreen) {
                // Fullscreen GIF — large, centered
                html += '<img src="' + img.b64 + '" class="fullscreen-gif reveal-hidden">';
            } else if (typeof img === 'object' && img.large) {
                // Large positioned image — preserved from PPTX position
                html += '<img src="' + img.b64 + '" class="reveal-hidden" style="position:absolute; left:' + img.left_pct + '%; top:' + img.top_pct + '%; width:' + img.width_pct + '%; height:' + (img.height_pct || 'auto') + (img.height_pct ? '%' : '') + '; z-index:1; object-fit:contain;">';
            } else {
                // Regular accent image
                const src = typeof img === 'object' ? img.b64 : img;
                html += '<img src="' + src + '" class="reveal-hidden" style="position:absolute; right:2vw; top:10vh; max-width:30vw; max-height:40vh; z-index:2; border-radius:8px;">';
            }
        });
    }

    html += '<div class="buttons reveal-hidden">';
    slide.buttons.forEach(btn => {
        html += '<button class="btn" onclick="goToSlide(\'' + btn.target + '\')">' + btn.text + '</button>';
    });
    html += '</div>';

    el.innerHTML = html;
    document.getElementById('game').appendChild(el);

    const textLines = el.querySelectorAll('.pptx-text, .text-line');
    const accentImgs = el.querySelectorAll('img.reveal-hidden');
    const btnsEl = el.querySelector('.buttons');

    if (slide.type === 'gameover') {
        // Game over: show everything immediately
        textLines.forEach(l => l.classList.add('revealed'));
        accentImgs.forEach(i => i.classList.add('revealed'));
        if (btnsEl) btnsEl.classList.add('revealed');
    } else {
        // Line-by-line reveal with 2 second delay
        const delay = 2000;
        textLines.forEach((line, idx) => {
            setTimeout(() => line.classList.add('revealed'), (idx + 1) * delay);
        });
        accentImgs.forEach((img, idx) => {
            setTimeout(() => img.classList.add('revealed'), (textLines.length / 2 + idx) * delay);
        });
        const btnDelay = (textLines.length + 1) * delay + (slide.type === 'decision' ? 2500 : 1500);
        setTimeout(() => { if (btnsEl) btnsEl.classList.add('revealed'); }, btnDelay);
    }

    requestAnimationFrame(() => {
        el.style.display = 'flex';
        requestAnimationFrame(() => el.classList.add('active'));
    });
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

window.addEventListener('load', () => {
    if (SLIDES.length > 0) goToSlide(SLIDES[0].id);
});
</script>

<script>
(function() {
  if (typeof window.goToSlide !== 'function') return;
  // Ensure aspect-frame container exists once
  function ensureFrame() {
    var f = document.getElementById('tw2-aspect-frame');
    if (!f) {
      f = document.createElement('div');
      f.id = 'tw2-aspect-frame';
      var game = document.getElementById('game') || document.body;
      game.appendChild(f);
    }
    return f;
  }
  var prev = window.goToSlide;
  window.goToSlide = function(id) {
    prev(id);
    if (typeof id !== 'string' || id === 'HOME' || id.endsWith('.html')) return;
    if (typeof SLIDES === 'undefined') return;
    var slide = SLIDES.find(function(s){ return s.id === id; });
    if (!slide || !slide.buttons || !slide.buttons.length) return;

    setTimeout(function() {
      var frame = ensureFrame();
      // Clear previous hotspots
      frame.innerHTML = '';
      var positioned = 0;
      slide.buttons.forEach(function(btn) {
        if (!btn.pptx_pos) return;
        var hs = document.createElement('div');
        hs.className = 'tw2-hotspot';
        hs.style.left   = btn.pptx_pos.left + '%';
        hs.style.top    = btn.pptx_pos.top  + '%';
        hs.style.width  = btn.pptx_pos.w    + '%';
        hs.style.height = btn.pptx_pos.h    + '%';
        hs.title = btn.text;
        hs.onclick = function() { window.goToSlide(btn.target); };
        frame.appendChild(hs);
        positioned++;
      });
      var active = document.querySelector('.slide.active');
      if (active && positioned === slide.buttons.length && positioned > 0) {
        active.classList.add('tw2-fully-positioned');
      }
    }, 80);
  };
})();
</script>

<script>
(function() {
  // Load YouTube IFrame Player API once
  if (!document.getElementById('yt-iframe-api-script')) {
    var tag = document.createElement('script');
    tag.id = 'yt-iframe-api-script';
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  }
  // Track active player so we can listen for end-of-song
  window._tw2_yt_player = null;

  function bindEndListener() {
    var iframes = document.querySelectorAll('.yt-overlay iframe');
    iframes.forEach(function(iframe) {
      // Ensure enablejsapi=1 so the API can attach
      try {
        var src = iframe.src || '';
        if (src && src.indexOf('enablejsapi=1') === -1 && src.indexOf('about:blank') === -1) {
          iframe.src = src + (src.indexOf('?') >= 0 ? '&' : '?') + 'enablejsapi=1';
        }
      } catch(e) {}
      if (!window.YT || !window.YT.Player) return;
      if (iframe._tw2_bound) return;
      iframe._tw2_bound = true;
      try {
        window._tw2_yt_player = new window.YT.Player(iframe, {
          events: {
            'onStateChange': function(event) {
              // YT.PlayerState.ENDED === 0
              if (event.data === 0) {
                var bg = document.getElementById('bg-music');
                if (bg) {
                  bg.muted = false;
                  if (bg.paused) {
                    try { bg.volume = 0.45; bg.play().catch(function(){}); } catch(e){}
                  }
                }
              }
            }
          }
        });
      } catch(e) {}
    });
  }

  // Watch the game div for new yt-overlay nodes (engine creates them async)
  var observer = new MutationObserver(function(muts) {
    var hasYt = false;
    muts.forEach(function(m) {
      m.addedNodes && m.addedNodes.forEach(function(n) {
        if (n.nodeType === 1 && (n.classList && n.classList.contains('yt-overlay') ||
            (n.querySelector && n.querySelector('.yt-overlay')))) {
          hasYt = true;
        }
      });
    });
    if (hasYt) {
      // Slight delay so iframe src is set first by the existing engine
      setTimeout(bindEndListener, 400);
    }
  });
  document.addEventListener('DOMContentLoaded', function() {
    var game = document.getElementById('game');
    if (game) observer.observe(game, { childList: true, subtree: true });
    // Also handle YouTube API readiness — bind any iframes already present
    window.onYouTubeIframeAPIReady = function() { bindEndListener(); };
  });
})();
</script>

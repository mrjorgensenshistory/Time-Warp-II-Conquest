<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Bangers&display=swap" rel="stylesheet">
<title>Time Warp - Da Gama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    color: white;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}
.slide {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
    flex-direction: column;
}
.slide.active {
    display: flex;
    opacity: 1;
}
.slide-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 0;
}
.slide-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.15);
}
.slide-content {
    position: relative;
    z-index: 1;
    padding: 1vh 1vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-end;
    max-width: 100%;
}
/* Text box: solid white — matching PPTX Bangers font style */
.text-box {
    background: #fff;
    border: 2px solid #000;
    padding: 2vh 2.5vw;
    margin: 1vh 1vw 1vh auto;
    max-width: 50%;
    color: #000;
    font-size: clamp(1rem, 1.7vw, 1.3rem);
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-weight: normal;
    line-height: 1.5;
    letter-spacing: 0.5px;
}
/* Dark theme text box - slides WITHOUT background images */
.text-box-dark {
    background: transparent !important;
    border: none !important;
    color: #e0e0e0 !important;
    font-style: normal !important;
    text-transform: none !important;
    font-size: clamp(1rem, 1.8vw, 1.3rem) !important;
    line-height: 1.8 !important;
    max-width: 85% !important;
    margin: 2vh auto !important;
    text-align: center !important;
    padding: 3vh 4vw !important;
}
.text-box-dark .text-line {
    color: #e0e0e0;
}
/* PPTX-extracted positioned text blocks */
.pptx-text {
    line-height: 1.4;
    word-wrap: break-word;
    overflow: hidden;
}
.text-line {
    margin-bottom: 0.5em;
}
.reveal-hidden {
    opacity: 0 !important;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal-hidden.revealed {
    opacity: 1 !important;
    transform: translateY(0);
}
.slide-title {
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-weight: bold;
    margin-bottom: 1.5vh;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.accent-images {
    position: absolute;
    right: 3vw;
    top: 12vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}
.accent-images img {
    max-width: 30vw;
    max-height: 35vh;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
/* Fullscreen GIFs — displayed large, centered */
.fullscreen-gif {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    max-width: 80vw;
    max-height: 70vh;
    border-radius: 8px;
}
.buttons {
    position: absolute;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 1vh;
    z-index: 3;
    max-width: 55%;
    align-items: center;
}
.btn {
    background: #fff;
    color: #000;
    border: 2px solid #000;
    border-radius: 0;
    padding: 1.5vh 3vw;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-size: clamp(0.9rem, 1.5vw, 1.15rem);
    font-weight: normal;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 25vw;
    text-align: center;
    letter-spacing: 0.5px;
}
.btn:hover {
    background: #eee;
    transform: scale(1.02);
}
.gameover-slide .slide-title {
    color: #ff3333;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-align: center;
    animation: shake 0.5s ease;
}
.gameover-slide .btn {
    background: #cc0000;
    border-color: #cc0000;
    color: #fff;
}
.gameover-slide .btn:hover {
    background: #ff3333;
}
#fullscreen-btn {
    position: fixed;
    top: 1vh; right: 1vw;
    z-index: 999;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 5px;
    padding: 0.5vh 1vw;
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0.5;
}
#fullscreen-btn:hover { opacity: 1; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}
</style>
</head>
<body>
<div id="game"></div>
<button id="fullscreen-btn" onclick="toggleFullscreen()">&#x26F6; Fullscreen</button>

[], "bg_image": "slides/dagama/page_08.jpg", "images": [], "buttons": [{"text": "Run away", "target": "slide_9"}, {"text": "Attack the city", "target": "slide_8"}], "color": "#E74C3C"}, {"id": "slide_8", "type": "gameover", "title": "Bad form, Captain.", "body": "Da Gama burned bridges. The locals burned back. You became the villain of the story.\n\nBad idea. They are an Entire city. You are not.", "styled_texts": [], "bg_image": "slides/dagama/page_09.jpg", "images": [{"b64": "https://media.tenor.com/U3ad7iq1DrkAAAAM/captain-hook-hook.gif", "fullscreen": true}], "buttons": [{"text": "Try Again", "target": "slide_1"}], "color": "#E74C3C"}, {"id": "slide_9", "type": "decision", "title": "", "body": "You get away (and bravely fire your cannons at the city as you run) but find you are low on supplies. You're worried you've built a bad reputation among the Africans. What will you do for supplies?", "styled_texts": [], "bg_image": "slides/dagama/page_10.jpg", "images": [], "buttons": [{"text": "Land at the next town", "target": "slide_10"}, {"text": "Steal from Ships at Sea", "target": "slide_11"}], "color": "#E74C3C"}, {"id": "slide_10", "type": "decision", "title": "You", "body": "Angry villagers", "styled_texts": [], "bg_image": "slides/dagama/page_11.jpg", "images": [], "buttons": [{"text": "Try Again", "target": "slide_1"}, {"text": "Bad news. They've heard of you.", "target": "slide_11"}], "color": "#E74C3C"}, {"id": "slide_11", "type": "decision", "title": "", "body": "You steal enough to survive but you'Re not sure you can finish the voyage to india without a proper stop and resupply. The next Major african city is Malindi. Will you stop here or push on and hope to make it to india?", "styled_texts": [], "bg_image": "slides/dagama/page_12.jpg", "images": [], "buttons": [{"text": "Stop here", "target": "slide_12"}, {"text": "Continue to India", "target": "slide_3"}], "color": "#E74C3C"}, {"id": "slide_12", "type": "story", "title": "", "body": "You stop and find they are happy to see you. Yes, they've heard of you. Lucky for you malindi is at war with mozambique so they are happy to meet someone who made them so upset. Here you meet a local Muslim guide who tells you he can get you the rest of the way to india.", "styled_texts": [], "bg_image": "slides/dagama/page_13.jpg", "images": [], "buttons": [{"text": "Continue to India", "target": "slide_13"}], "color": "#E74C3C"}, {"id": "slide_13", "type": "story", "title": "", "body": "The Guide's advice was perfect. You catch the wind just right and easily complete the voyage to india. You did it! You are the first European Captain to sail to the indies!", "styled_texts": [], "bg_image": "slides/dagama/page_14.jpg", "images": [], "buttons": [{"text": "Visit the Market", "target": "slide_14"}], "color": "#E74C3C"}, {"id": "slide_14", "type": "decision", "title": "India", "body": "You load up on trade goods. You estimate the treasure you are carrying is worth at least 60 times  the cost of this voyage. If you can make it back home with it you'll not only be rich but a hero.", "styled_texts": [], "bg_image": "slides/dagama/page_15.jpg", "images": [], "buttons": [{"text": "Sail Home Immediately", "target": "slide_15"}, {"text": "Stay in India Awhile", "target": "slide_16"}], "color": "#E74C3C"}, {"id": "slide_15", "type": "story", "title": "", "body": "Given your past experience you decide it it best to get out while you can. Unfortunately, this means you are leaving in a bad season to the wind is against you. It took you 21 days to sail this ocean on the way here - it takes 123 days to sail back. You manage to make it back to Malindi - but just barely. You, your ships, and your crew are in extremely bad shape.", "styled_texts": [], "bg_image": "slides/dagama/page_16.jpg", "images": [], "buttons": [{"text": "Return to Malindi", "target": "slide_16"}], "color": "#E74C3C"}, {"id": "slide_16", "type": "story", "title": "", "body": "You decide to wait for the summer so the winds are at your back. Unfortunately, that means the storms are at their worst. It took you 21 days to sail this ocean on the way here - it takes 123 days to sail back. You manage to make it back to Malindi - but just barely. You, your ships, and your crew are in extremely bad shape.", "styled_texts": [], "bg_image": "slides/dagama/page_17.jpg", "images": [], "buttons": [{"text": "Return to Malindi", "target": "slide_17"}], "color": "#E74C3C"}, {"id": "slide_17", "type": "decision", "title": "", "body": "Many of your mean are sick and some have died already from the harrowing trip across the indian ocean. You've lost so many that you aren't sure you can safely sail all 3 ships back home unless you get more men.", "styled_texts": [], "bg_image": "slides/dagama/page_18.jpg", "images": [], "buttons": [{"text": "Leave one Ship behind", "target": "slide_19"}, {"text": "Hire some Foreign Sailors", "target": "slide_18"}], "color": "#E74C3C"}, {"id": "slide_18", "type": "reveal", "title": "", "body": "The foreign crewmen are happy to join your ship - and take it. They throw you and your weakened men overboard and leave with your treasure.\nSee what Really Happened", "styled_texts": [], "bg_image": "slides/dagama/page_19.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_19"}], "color": "#E74C3C"}, {"id": "slide_19", "type": "reveal", "title": "", "body": "You abandon one of your ships and sail out of port for one final time - you hope. After a couple more months at sea you make it back home. You are greeted as a hero but you don't feel much like one. Half of you crew has died on the voyage, including your own brother. You are rich and will be remembered forever - but at what cost?\nSee What Really Happened", "styled_texts": [], "bg_image": "slides/dagama/page_20.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_20"}], "color": "#E74C3C"}, {"id": "slide_20", "type": "info", "title": "", "body": "What Really Happened?\n\nDa Gama's voyage, though difficult, was a huge success. Following in the footsteps of other Portuguese explorers like Bartolomeu Dias he sailed around the southern tip of Africa. He then sailed north eventually becoming the first European to sail across the Indian Ocean. He arrived in India, again the first European to do so, and loaded up trade goods worth 60 times the entire cost of his ships, crew and supplies. It did come at great personal cost as many of his friends, and his own brother, died on the voyage.\nReload Personality Analyzer", "styled_texts": [], "bg_image": "slides/dagama/page_21.jpg", "images": [], "buttons": [{"text": "Back to Hub", "target": "HOME"}], "color": "#E74C3C"}];
let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        audioUnlocked = true;
    } catch(e) {}
}
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

// Button sound system (synthesized - no copyright)
const _actx = new (window.AudioContext || window.webkitAudioContext)();
function playButtonClick() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.frequency.value = 600; osc.type = 'sine';
        gain.gain.value = 0.15;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.15);
        osc.stop(_actx.currentTime + 0.15);
    } catch(e) {}
}
function playDecisionClick() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.frequency.value = 440; osc.type = 'triangle';
        gain.gain.value = 0.12;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(220, _actx.currentTime + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.3);
        osc.stop(_actx.currentTime + 0.3);
    } catch(e) {}
}
function playCorrectChime() {
    try {
        [523, 659, 784].forEach((freq, i) => {
            const osc = _actx.createOscillator();
            const gain = _actx.createGain();
            osc.connect(gain); gain.connect(_actx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.08;
            osc.start(_actx.currentTime + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + i * 0.12 + 0.2);
            osc.stop(_actx.currentTime + i * 0.12 + 0.2);
        });
    } catch(e) {}
}
function playGameOverBuzz() {
    try {
        const osc = _actx.createOscillator();
        const gain = _actx.createGain();
        osc.connect(gain); gain.connect(_actx.destination);
        osc.type = 'sawtooth'; osc.frequency.value = 200;
        gain.gain.value = 0.15;
        osc.start();
        osc.frequency.exponentialRampToValueAtTime(60, _actx.currentTime + 0.6);
        gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + 0.6);
        osc.stop(_actx.currentTime + 0.6);
    } catch(e) {}
}

function goToSlide(id) {
    /* TW2-EXT-HTML-TARGET */
    if (typeof id === 'string' && id.endsWith('.html')) { window.location.href = id; return; }
    if (!id) return;
    if (id === 'HOME') {
        window.location.href = 'analyzer.html';
        return;
    }
    const slide = SLIDES.find(s => s.id === id);
    if (!slide) return;

    // Play sounds based on slide type
    if (slide.type === 'gameover') {
        playGameOverBuzz();
    } else if (slide.type === 'decision') {
        playDecisionClick();
    } else if (slide.type === 'reveal') {
        playCorrectChime();
    } else {
        playButtonClick();
    }

    document.querySelectorAll('.slide.active').forEach(el => {
        el.classList.remove('active');
        setTimeout(() => el.style.display = 'none', 600);
    });

    const music = document.getElementById('bg-music');
    if (music && music.paused) {
        music.volume = 0;
        music.play().then(() => {
            let vol = 0;
            const fadeIn = setInterval(() => {
                vol += 0.02;
                if (vol >= 0.2) { music.volume = 0.2; clearInterval(fadeIn); }
                else { music.volume = vol; }
            }, 100);
        }).catch(() => {});
    }

    if (slide.type === 'gameover') {
        // Pause music and play game over sound
        if (music && !music.paused) music.pause();
        const goSound = document.getElementById('gameover-sound');
        if (goSound) {
            goSound.currentTime = 0;
            goSound.volume = 0.6;
            setTimeout(() => goSound.play().catch(() => {}), 300);
        }
    } else {
        // Resume music on non-gameover slides
        if (music && music.paused && music.currentTime > 0) {
            music.volume = 0.2;
            music.play().catch(() => {});
        }
    }

    const el = document.createElement('div');
    el.className = 'slide ' + slide.type + '-slide';

    let html = '';
    const hasBg = !!slide.bg_image;
    if (hasBg) {
        html += '<div class="slide-bg" style="background-image:url(' + slide.bg_image + ')"></div>';
    } else {
        // Dark themed background for slides without images
        html += '<div class="slide-bg" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);"></div>';
    }

    html += '<div class="slide-content">';
    if (slide.title) {
        html += '<div class="slide-title">' + slide.title + '</div>';
    }
    // Render text blocks with original PPTX styles
    if (slide.styled_texts && slide.styled_texts.length > 0) {
        slide.styled_texts.forEach((block, idx) => {
            const css = block.css || '';
            // Each text block is its own positioned element with original PPTX styling
            html += '<div class="pptx-text reveal-hidden" style="' + css + '; z-index: 1; padding: 1.5vh 2vw; box-sizing: border-box;" data-idx="' + idx + '">' + block.text + '</div>';
        });
    } else if (slide.body) {
        // Fallback: plain body text
        const boxClass = hasBg ? 'text-box' : 'text-box text-box-dark';
        html += '<div class="' + boxClass + ' reveal-hidden">' + slide.body + '</div>';
    }
    html += '</div>';

    if (slide.images && slide.images.length > 0) {
        slide.images.forEach(img => {
            if (typeof img === 'object' && img.fullscreen) {
                // Fullscreen GIF — large, centered
                html += '<img src="' + img.b64 + '" class="fullscreen-gif reveal-hidden">';
            } else if (typeof img === 'object' && img.large) {
                // Large positioned image — preserved from PPTX position
                html += '<img src="' + img.b64 + '" class="reveal-hidden" style="position:absolute; left:' + img.left_pct + '%; top:' + img.top_pct + '%; width:' + img.width_pct + '%; height:' + (img.height_pct || 'auto') + (img.height_pct ? '%' : '') + '; z-index:1; object-fit:contain;">';
            } else {
                // Regular accent image
                const src = typeof img === 'object' ? img.b64 : img;
                html += '<img src="' + src + '" class="reveal-hidden" style="position:absolute; right:2vw; top:10vh; max-width:30vw; max-height:40vh; z-index:2; border-radius:8px;">';
            }
        });
    }

    html += '<div class="buttons reveal-hidden">';
    slide.buttons.forEach(btn => {
        html += '<button class="btn" onclick="goToSlide(\'' + btn.target + '\')">' + btn.text + '</button>';
    });
    html += '</div>';

    el.innerHTML = html;
    document.getElementById('game').appendChild(el);

    const textLines = el.querySelectorAll('.pptx-text, .text-line');
    const accentImgs = el.querySelectorAll('img.reveal-hidden');
    const btnsEl = el.querySelector('.buttons');

    if (slide.type === 'gameover') {
        // Game over: show everything immediately
        textLines.forEach(l => l.classList.add('revealed'));
        accentImgs.forEach(i => i.classList.add('revealed'));
        if (btnsEl) btnsEl.classList.add('revealed');
    } else {
        // Line-by-line reveal with 2 second delay
        const delay = 2000;
        textLines.forEach((line, idx) => {
            setTimeout(() => line.classList.add('revealed'), (idx + 1) * delay);
        });
        accentImgs.forEach((img, idx) => {
            setTimeout(() => img.classList.add('revealed'), (textLines.length / 2 + idx) * delay);
        });
        const btnDelay = (textLines.length + 1) * delay + (slide.type === 'decision' ? 2500 : 1500);
        setTimeout(() => { if (btnsEl) btnsEl.classList.add('revealed'); }, btnDelay);
    }

    requestAnimationFrame(() => {
        el.style.display = 'flex';
        requestAnimationFrame(() => el.classList.add('active'));
    });
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

window.addEventListener('load', () => {
    if (SLIDES.length > 0) goToSlide(SLIDES[0].id);
});
</script>

<script>
// Issue #7: Suppress synthetic gameover buzz when external MP3 exists
(function() {
  if (typeof window.playGameOverBuzz === 'function') {
    var orig = window.playGameOverBuzz;
    window.playGameOverBuzz = function() {
      if (document.getElementById('gameover-sound')) return;  // MP3 will play instead
      try { orig(); } catch(e) {}
    };
  }
  // Also: if we have an external bg-music + the engine started a fadeIn interval
  // before the user clicked into a gameover, ensure the music actually pauses.
  // Watch for type=gameover slides being shown and force-pause bg-music.
  var observer = new MutationObserver(function(muts) {
    for (var i = 0; i < muts.length; i++) {
      var added = muts[i].addedNodes;
      for (var j = 0; j < added.length; j++) {
        var n = added[j];
        if (n.nodeType === 1 && n.classList && n.classList.contains('gameover-slide')) {
          var bg = document.getElementById('bg-music');
          if (bg && !bg.paused) {
            try { bg.pause(); bg.volume = 0; } catch(e) {}
          }
        }
      }
    }
  });
  if (document.getElementById('game')) {
    observer.observe(document.getElementById('game'), { childList: true });
  }
})();
</script>

<script>
(function() {
  if (typeof window.goToSlide !== 'function') return;
  var _origGoToSlide = window.goToSlide;
  window.goToSlide = function(id) {
    // Tear down any existing YT iframe before navigating
    document.querySelectorAll('.yt-overlay').forEach(function(el){ el.remove(); });
    var bg = document.getElementById('bg-music');
    if (bg) bg.muted = false;

    _origGoToSlide(id);

    if (id === 'HOME' || (id || '').endsWith('.html')) return;
    if (typeof SLIDES === 'undefined') return;
    var slide = SLIDES.find(function(s){ return s.id === id; });
    if (!slide || !slide.youtube_embed) return;

    // Render YT overlay
    setTimeout(function() {
      var active = document.querySelector('.slide.active');
      if (!active) return;
      var ov = document.createElement('div');
      ov.className = 'yt-overlay';
      ov.innerHTML =
        '<div class="yt-label">▶ Play before continuing</div>' +
        '<iframe src="https://www.youtube.com/embed/' + slide.youtube_embed + '?autoplay=1&rel=0&modestbranding=1" ' +
        'allow="autoplay; encrypted-media" allowfullscreen></iframe>';
      active.appendChild(ov);
      if (bg) bg.muted = true;
    }, 100);
  };
})();
</script>

<script>
(function() {
  if (typeof window.goToSlide !== 'function') return;
  var prev = window.goToSlide;
  window.goToSlide = function(id) {
    var active = document.querySelector('.slide.active');
    if (active && active.classList.contains('gameover-slide')) {
      var go = document.getElementById('gameover-sound');
      if (go) { try { go.pause(); go.currentTime = 0; } catch(e) {} }
    }
    // Also kill any active YT iframe audio
    document.querySelectorAll('.yt-overlay').forEach(function(el){
      var f = el.querySelector('iframe');
      if (f) { try { f.src = 'about:blank'; } catch(e){} }
      el.remove();
    });
    var bg = document.getElementById('bg-music');
    if (bg) bg.muted = false;
    prev(id);
  };
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech&family=Bangers&family=Caveat&display=swap" rel="stylesheet">
<title>Time Warp - Magellan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    color: white;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}
#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
}
.slide {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
    flex-direction: column;
}
.slide.active {
    display: flex;
    opacity: 1;
}
.slide-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    z-index: 0;
}
.slide-bg::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.15);
}
.slide-content {
    position: relative;
    z-index: 1;
    padding: 1vh 1vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-end;
    max-width: 100%;
}
/* Text box: solid white — matching PPTX Bangers font style */
.text-box {
    background: #fff;
    border: 2px solid #000;
    padding: 2vh 2.5vw;
    margin: 1vh 1vw 1vh auto;
    max-width: 50%;
    color: #000;
    font-size: clamp(1rem, 1.7vw, 1.3rem);
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-weight: normal;
    line-height: 1.5;
    letter-spacing: 0.5px;
}
/* Dark theme text box - slides WITHOUT background images */
.text-box-dark {
    background: transparent !important;
    border: none !important;
    color: #e0e0e0 !important;
    font-style: normal !important;
    text-transform: none !important;
    font-size: clamp(1rem, 1.8vw, 1.3rem) !important;
    line-height: 1.8 !important;
    max-width: 85% !important;
    margin: 2vh auto !important;
    text-align: center !important;
    padding: 3vh 4vw !important;
}
.text-box-dark .text-line {
    color: #e0e0e0;
}
/* PPTX-extracted positioned text blocks */
.pptx-text {
    line-height: 1.4;
    word-wrap: break-word;
    overflow: hidden;
}
.text-line {
    margin-bottom: 0.5em;
}
.reveal-hidden {
    opacity: 0 !important;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}
.reveal-hidden.revealed {
    opacity: 1 !important;
    transform: translateY(0);
}
.slide-title {
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-weight: bold;
    margin-bottom: 1.5vh;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
.accent-images {
    position: absolute;
    right: 3vw;
    top: 12vh;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}
.accent-images img {
    max-width: 30vw;
    max-height: 35vh;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
/* Fullscreen GIFs — displayed large, centered */
.fullscreen-gif {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    max-width: 80vw;
    max-height: 70vh;
    border-radius: 8px;
}
.buttons {
    position: absolute;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 1vh;
    z-index: 3;
    max-width: 55%;
    align-items: center;
}
.btn {
    background: #fff;
    color: #000;
    border: 2px solid #000;
    border-radius: 0;
    padding: 1.5vh 3vw;
    font-family: 'Bangers', 'Arial Black', 'Impact', sans-serif;
    font-size: clamp(0.9rem, 1.5vw, 1.15rem);
    font-weight: normal;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 25vw;
    text-align: center;
    letter-spacing: 0.5px;
}
.btn:hover {
    background: #eee;
    transform: scale(1.02);
}
.gameover-slide .slide-title {
    color: #ff3333;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-align: center;
    animation: shake 0.5s ease;
}
.gameover-slide .btn {
    background: #cc0000;
    border-color: #cc0000;
    color: #fff;
}
.gameover-slide .btn:hover {
    background: #ff3333;
}
#fullscreen-btn {
    position: fixed;
    top: 1vh; right: 1vw;
    z-index: 999;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 5px;
    padding: 0.5vh 1vw;
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0.5;
}
#fullscreen-btn:hover { opacity: 1; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
}
</style>
</head>

 6.6}}], "color": "#8E44AD"}, {"id": "slide_13", "type": "gameover", "title": "Lapulapu had something to say about that.", "body": "Magellan made it most of the way around the world. Most.\n\nYou fear the portuguese will be a problem if you land in their city so you decide to sail on. Unfortunately, before you reach another city your supplies run out and your men begin to die of starvation.", "styled_texts": [], "bg_image": "slides/magellan/page_14.jpg", "images": [{"b64": "https://media.tenor.com/FiMjpNy5VGEAAAAM/adam-sandler-tackle.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1", "pptx_pos": {"left": 40.9, "top": 75.1, "w": 15.1, "h": 11.0}}], "color": "#8E44AD"}, {"id": "slide_14", "type": "story", "title": "", "body": "You sail south a bit but Winter is coming and sailing further would be a bad idea. You decide to set up camp for the winter. 3 of your captains don't want to wait. They start a mutiny! They want you removed as captain and they are willing to do it violently. You act quickly. You have your men sneak over to the other ships and cut their anchor cables leaving them drifting out into in the ocean. You then capture the 3 captains. You behead two on the spot. The 3rd you leave marooned on an island.", "styled_texts": [], "bg_image": "slides/magellan/page_15.jpg", "images": [], "buttons": [{"text": "Continue your voyage", "target": "slide_15", "pptx_pos": {"left": 1.7, "top": 81.3, "w": 40.6, "h": 7.1}}], "color": "#8E44AD"}, {"id": "slide_15", "type": "decision", "title": "", "body": "The further south you sail the worse the ocean gets. You are now in completely unknown waters and don't know what dangers lie ahead.", "styled_texts": [], "bg_image": "slides/magellan/page_16.jpg", "images": [], "buttons": [{"text": "Keep all your ships together", "target": "slide_17", "pptx_pos": {"left": 65.2, "top": 65.4, "w": 32.4, "h": 6.6}}, {"text": "Send one ship to scout ahead", "target": "slide_16", "pptx_pos": {"left": 1.8, "top": 65.4, "w": 32.4, "h": 6.6}}], "color": "#8E44AD"}, {"id": "slide_16", "type": "reveal", "title": "", "body": "You send a scout ship ahead thinking one small ship would have better luck navigating the rocks. Six weeks later you see the crew walk out of the jungle and onto the beach. \"What happened to your ship?\" you ask. \"HIt a rock captain we had to walk all the way back., On the bright side, we think we've found a safe passageway through! The waters there looked quite calm.", "styled_texts": [], "bg_image": "slides/magellan/page_17.jpg", "images": [], "buttons": [{"text": "Head for the passage", "target": "slide_18", "pptx_pos": {"left": 31.7, "top": 29.4, "w": 40.6, "h": 7.1}}], "color": "#8E44AD"}, {"id": "slide_17", "type": "gameover", "title": "Lapulapu had something to say about that.", "body": "Magellan made it most of the way around the world. Most.\n\nYou keep the ships together which means when a vicious storm hits all of them sink together. Well, at least they weren't lonely… that's something right?", "styled_texts": [], "bg_image": "slides/magellan/page_18.jpg", "images": [{"b64": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif", "fullscreen": true}], "buttons": [{"text": "Try again", "target": "slide_1", "pptx_pos": {"left": 42.4, "top": 72.1, "w": 15.1, "h": 11.0}}], "color": "#8E44AD"}, {"id": "slide_18", "type": "story", "title": "", "body": "It is difficult but you make it! You pass through the strait and into the calm waters of the pacific. The island of guam is next - only 10,000 (!) miles away.", "styled_texts": [], "bg_image": "slides/magellan/page_19.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_19"}], "color": "#8E44AD"}, {"id": "slide_19", "type": "story", "title": "", "body": "After a short stop on the island of Guam you and your crew make it to the philippine islands. You've done it! You've reached asia! As you are exploring the natives attack.  You are hit in the chest with a wooden spear. Many of your men are hit as well. Before long you die. Two of your ships manage to escape. They will have to make it home without you.", "styled_texts": [], "bg_image": "slides/magellan/page_20.jpg", "images": [], "buttons": [{"text": "Continue voyage", "target": "slide_20", "pptx_pos": {"left": 2.6, "top": 81.3, "w": 32.8, "h": 7.1}}], "color": "#8E44AD"}, {"id": "slide_20", "type": "decision", "title": "", "body": "The rapidly shrinking crew manages to reach the coast of Africa. There is still a long way to go to get home to spain. You have so few men that it is becoming difficult to command both ships. You think about leaving one behind but that would mean leaving all the treasure and trade goods it is carrying as well. It might still be your only hope of surviving to make it home.", "styled_texts": [], "bg_image": "slides/magellan/page_21.jpg", "images": [], "buttons": [{"text": "Continue with both ships", "target": "slide_22", "pptx_pos": {"left": 65.2, "top": 35.8, "w": 32.4, "h": 6.6}}, {"text": "Abandon one ship", "target": "slide_21", "pptx_pos": {"left": 1.8, "top": 35.8, "w": 32.4, "h": 6.6}}], "color": "#8E44AD"}, {"id": "slide_21", "type": "story", "title": "", "body": "It's  a bummer to have to scuttle one of your ships. You watch it slowly sink down into the ocean carrying more riches than you could count. Still, the only thing you really care about is staying alive and getting home. You load the surviving men onto the last ship and sail for spain.", "styled_texts": [], "bg_image": "slides/magellan/page_22.jpg", "images": [], "buttons": [{"text": "Sail for home", "target": "slide_23", "pptx_pos": {"left": 35.2, "top": 31.3, "w": 32.4, "h": 6.6}}], "color": "#8E44AD"}, {"id": "slide_22", "type": "reveal", "title": "", "body": "Giving up so much treasure after all the sacrifices you've made just isn't acceptable. You press on with both ships running a small crew. Before long you realize the folly of your choice. Dragging one ship behind leaves both ships in danger. You crash and both ships sink the bottom of the ocean.\nSee what Really happened", "styled_texts": [], "bg_image": "slides/magellan/page_23.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_24"}], "color": "#8E44AD"}, {"id": "slide_23", "type": "reveal", "title": "", "body": "Finally, after nearly three years at sea your last remaining ship pulls into Spain. Only a few of the original crew are left to the the tale but they've done it - they've circumnavigated the earth!\nSee what Really happened", "styled_texts": [], "bg_image": "slides/magellan/page_24.jpg", "images": [], "buttons": [{"text": "Continue", "target": "slide_24"}], "color": "#8E44AD"}, {"id": "slide_24", "type": "info", "title": "", "body": "What Really Happened?\n\nThe remaining ships limped back home to Spain. The journey took nearly 3 full years - far longer than planned. Of his 5 ships and 270 men only 1 ship and about 43 men survived. Still, the voyage is considered a success and great achievement. It was the first to circumnavigate the globe. Today, many sites and tools involving exploration are named in Magellan's honor.\nReload Personality Analyzer", "styled_texts": [], "bg_image": "slides/magellan/page_25.jpg", "images": [], "buttons": [{"text": "Back to Hub", "target": "HOME"}], "color": "#8E44AD"}];
let audioUnlocked = false;
function unlockAudio() {
    if (audioUnlocked) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        audioUnlocked = true;
    } catch(e) {}
}
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

function playCorrectChime() {
    try {
        [523, 659, 784].forEach((freq, i) => {
            const osc = _actx.createOscillator();
            const gain = _actx.createGain();
            osc.connect(gain); gain.connect(_actx.destination);
            osc.frequency.value = freq;
            gain.gain.value = 0.08;
            osc.start(_actx.currentTime + i * 0.12);
            gain.gain.exponentialRampToValueAtTime(0.001, _actx.currentTime + i * 0.12 + 0.2);

}

function goToSlide(id) {
    /* TW2-EXT-HTML-TARGET */
    if (typeof id === 'string' && id.endsWith('.html')) { window.location.href = id; return; }
    if (!id) return;
    if (id === 'HOME') {
        window.location.href = 'analyzer.html';
        return;
    }
    const slide = SLIDES.find(s => s.id === id);
    if (!slide) return;

    // Play sounds based on slide type
    if (slide.type === 'gameover') {
        playGameOverBuzz();
    } else if (slide.type === 'decision') {
        playDecisionClick();
    } else if (slide.type === 'reveal') {
        playCorrectChime();
    } else {
        playButtonClick();
    }

    document.querySelectorAll('.slide.active').forEach(el => {
        el.classList.remove('active');
        setTimeout(() => el.style.display = 'none', 600);
    });

    const music = document.getElementById('bg-music');
    if (music && music.paused) {
        music.volume = 0;
        music.play().then(() => {
            let vol = 0;
            const fadeIn = setInterval(() => {
                vol += 0.02;
                if (vol >= 0.2) { music.volume = 0.2; clearInterval(fadeIn); }
                else { music.volume = vol; }
            }, 100);
        }).catch(() => {});
    }

    if (slide.type === 'gameover') {
        // Pause music and play game over sound
        if (music && !music.paused) music.pause();
        const goSound = document.getElementById('gameover-sound');
        if (goSound) {
            goSound.currentTime = 0;
            goSound.volume = 0.6;
            setTimeout(() => goSound.play().catch(() => {}), 300);
        }
    } else {
        // Resume music on non-gameover slides
        if (music && music.paused && music.currentTime > 0) {
            music.volume = 0.2;
            music.play().catch(() => {});
        }
    }

    const el = document.createElement('div');
    el.className = 'slide ' + slide.type + '-slide';

    let html = '';
    const hasBg = !!slide.bg_image;
    if (hasBg) {
        html += '<div class="slide-bg" style="background-image:url(' + slide.bg_image + ')"></div>';
    } else {
        // Dark themed background for slides without images
        html += '<div class="slide-bg" style="background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);"></div>';
    }

    html += '<div class="slide-content">';
    if (slide.title) {
        html += '<div class="slide-title">' + slide.title + '</div>';
    }
    // Render text blocks with original PPTX styles
    if (slide.styled_texts && slide.styled_texts.length > 0) {
        slide.styled_texts.forEach((block, idx) => {
            const css = block.css || '';
            // Each text block is its own positioned element with original PPTX styling
            html += '<div class="pptx-text reveal-hidden" style="' + css + '; z-index: 1; padding: 1.5vh 2vw; box-sizing: border-box;" data-idx="' + idx + '">' + block.text + '</div>';
        });
    } else if (slide.body) {
        // Fallback: plain body text
        const boxClass = hasBg ? 'text-box' : 'text-box text-box-dark';
        html += '<div class="' + boxClass + ' reveal-hidden">' + slide.body + '</div>';
    }
    html += '</div>';

    if (slide.images && slide.images.length > 0) {
        slide.images.forEach(img => {
            if (typeof img === 'object' && img.fullscreen) {
                // Fullscreen GIF — large, centered
                html += '<img src="' + img.b64 + '" class="fullscreen-gif reveal-hidden">';
            } else if (typeof img === 'object' && img.large) {
                // Large positioned image — preserved from PPTX position
                html += '<img src="' + img.b64 + '" class="reveal-hidden" style="position:absolute; left:' + img.left_pct + '%; top:' + img.top_pct + '%; width:' + img.width_pct + '%; height:' + (img.height_pct || 'auto') + (img.height_pct ? '%' : '') + '; z-index:1; object-fit:contain;">';
            } else {
                // Regular accent image
                const src = typeof img === 'object' ? img.b64 : img;
                html += '<img src="' + src + '" class="reveal-hidden" style="position:absolute; right:2vw; top:10vh; max-width:30vw; max-height:40vh; z-index:2; border-radius:8px;">';
            }
        });
    }

    html += '<div class="buttons reveal-hidden">';
    slide.buttons.forEach(btn => {
        html += '<button class="btn" onclick="goToSlide(\'' + btn.target + '\')">' + btn.text + '</button>';
    });
    html += '</div>';

    el.innerHTML = html;
    document.getElementById('game').appendChild(el);

    const textLines = el.querySelectorAll('.pptx-text, .text-line');
    const accentImgs = el.querySelectorAll('img.reveal-hidden');
    const btnsEl = el.querySelector('.buttons');

    if (slide.type === 'gameover') {
        // Game over: show everything immediately
        textLines.forEach(l => l.classList.add('revealed'));
        accentImgs.forEach(i => i.classList.add('revealed'));
        if (btnsEl) btnsEl.classList.add('revealed');
    } else {
        // Line-by-line reveal with 2 second delay
        const delay = 2000;
        textLines.forEach((line, idx) => {
            setTimeout(() => line.classList.add('revealed'), (idx + 1) * delay);
        });
        accentImgs.forEach((img, idx) => {
            setTimeout(() => img.classList.add('revealed'), (textLines.length / 2 + idx) * delay);
        });
        const btnDelay = (textLines.length + 1) * delay + (slide.type === 'decision' ? 2500 : 1500);
        setTimeout(() => { if (btnsEl) btnsEl.classList.add('revealed'); }, btnDelay);
    }

    requestAnimationFrame(() => {
        el.style.display = 'flex';
        requestAnimationFrame(() => el.classList.add('active'));
    });
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
});

window.addEventListener('load', () => {
    if (SLIDES.length > 0) goToSlide(SLIDES[0].id);
});
</script>

<script>
// Issue #7: Suppress synthetic gameover buzz when external MP3 exists
(function() {
  if (typeof window.playGameOverBuzz === 'function') {
    var orig = window.playGameOverBuzz;
    window.playGameOverBuzz = function() {
      if (document.getElementById('gameover-sound')) return;  // MP3 will play instead
      try { orig(); } catch(e) {}
    };
  }
  // Also: if we have an external bg-music + the engine started a fadeIn interval
  // before the user clicked into a gameover, ensure the music actually pauses.
  // Watch for type=gameover slides being shown and force-pause bg-music.
  var observer = new MutationObserver(function(muts) {
    for (var i = 0; i < muts.length; i++) {
      var added = muts[i].addedNodes;
      for (var j = 0; j < added.length; j++) {
        var n = added[j];
        if (n.nodeType === 1 && n.classList && n.classList.contains('gameover-slide')) {
          var bg = document.getElementById('bg-music');
          if (bg && !bg.paused) {
            try { bg.pause(); bg.volume = 0; } catch(e) {}
          }
        }
      }
    }
  });
  if (document.getElementById('game')) {
    observer.observe(document.getElementById('game'), { childList: true });
  }
})();
</script>

<style>
/* 16:9 aspect-ratio wrapper that holds the slide bg + hotspots together.
   Centered in the viewport, sized to whichever dimension limits the 16:9 fit.
   Hotspots positioned inside this wrap with PPTX % become exactly aligned. */
#tw2-aspect-frame {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 100vw;
  height: calc(100vw * 9 / 16);
  max-height: 100vh;
  aspect-ratio: 16 / 9;
  pointer-events: none;
  z-index: 60;
}
@media (min-aspect-ratio: 16/9) {
  #tw2-aspect-frame {
    width: calc(100vh * 16 / 9);
    height: 100vh;
  }
}
.tw2-hotspot {
  position: absolute;
  z-index: 100 !important;
  cursor: pointer;
  border: 2px dashed rgba(201, 161, 74, 0.55);
  background: rgba(201, 161, 74, 0.06);

}
.tw2-hotspot:hover {
  border-color: rgba(255, 215, 0, 1);
  border-style: solid;
  background: rgba(201, 161, 74, 0.2);
  box-shadow: 0 0 18px rgba(255, 215, 0, 0.45);
  transform: scale(1.02);
}

@keyframes tw2-hotspot-pulse {
  0%, 100% { box-shadow: 0 0 12px rgba(201,161,74,0.12) inset, 0 0 6px rgba(201,161,74,0.3); }
  50%      { box-shadow: 0 0 12px rgba(201,161,74,0.25) inset, 0 0 14px rgba(255,215,0,0.55); }
}
.tw2-hotspot { animation: tw2-hotspot-pulse 2.4s ease-in-out infinite; }

/* Hide the engine bottom-button row on slides where every button is positioned */
.slide.tw2-fully-positioned .buttons {
  display: none !important;
}
</style>
<script>
(function() {
  if (typeof window.goToSlide !== 'function') return;
  // Ensure aspect-frame container exists once
  function ensureFrame() {
    var f = document.getElementById('tw2-aspect-frame');
    if (!f) {
      f = document.createElement('div');
      f.id = 'tw2-aspect-frame';
      var game = document.getElementById('game') || document.body;
      game.appendChild(f);
    }
    return f;
  }
  var prev = window.goToSlide;
  window.goToSlide = function(id) {
    prev(id);
    if (typeof id !== 'string' || id === 'HOME' || id.endsWith('.html')) return;
    if (typeof SLIDES === 'undefined') return;
    var slide = SLIDES.find(function(s){ return s.id === id; });
    if (!slide || !slide.buttons || !slide.buttons.length) return;

    setTimeout(function() {
      var frame = ensureFrame();
      // Clear previous hotspots
      frame.innerHTML = '';
      var positioned = 0;
      slide.buttons.forEach(function(btn) {
        if (!btn.pptx_pos) return;
        var hs = document.createElement('div');
        hs.className = 'tw2-hotspot';
        hs.style.left   = btn.pptx_pos.left + '%';
        hs.style.top    = btn.pptx_pos.top  + '%';
        hs.style.width  = btn.pptx_pos.w    + '%';
        hs.style.height = btn.pptx_pos.h    + '%';
        hs.title = btn.text;
        hs.onclick = function() { window.goToSlide(btn.target); };
        frame.appendChild(hs);
        positioned++;
      });
      var active = document.querySelector('.slide.active');
      if (active && positioned === slide.buttons.length && positioned > 0) {
        active.classList.add('tw2-fully-positioned');
      }
    }, 80);
  };
})();
</script>

<!-- TW2-YT-END-RESTORE-V2 -->
<script>
(function() {
  if (!document.getElementById('yt-iframe-api-script')) {
    var tag = document.createElement('script');
    tag.id = 'yt-iframe-api-script';
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  }
  window._tw2_yt_player = null;

  function bindEndListener() {
    var iframes = document.querySelectorAll('.yt-overlay iframe');
    iframes.forEach(function(iframe) {
      try {
        var src = iframe.src || '';
        if (src && src.indexOf('enablejsapi=1') === -1 && src.indexOf('about:blank') === -1) {
          iframe.src = src + (src.indexOf('?') >= 0 ? '&' : '?') + 'enablejsapi=1';
        }
      } catch(e) {}
      if (!window.YT || !window.YT.Player) return;
      if (iframe._tw2_bound) return;
      iframe._tw2_bound = true;
      try {
        window._tw2_yt_player = new window.YT.Player(iframe, {
          events: {
            'onReady': function(event) {
              try { event.target.setVolume(100); } catch(e) {}
              try { event.target.unMute(); } catch(e) {}
              // Hard-mute bg-music while song plays
              var bg = document.getElementById('bg-music');
              if (bg) { bg.muted = true; bg.volume = 0; }
            },
            'onStateChange': function(event) {
              if (event.data === 1) {  // PLAYING
                try { event.target.setVolume(100); } catch(e) {}
                var bg = document.getElementById('bg-music');
                if (bg) { bg.muted = true; bg.volume = 0; }
              }
              if (event.data === 0) {  // ENDED
                var bg = document.getElementById('bg-music');
                if (bg) {
                  bg.muted = false;
                  bg.volume = 0.45;
                  if (bg.paused) {
                    try { bg.play().catch(function(){}); } catch(e){}
                  }
                }
              }
            }
          }
        });
      } catch(e) {}
    });
  }

  // Force-mute bg-music while YT iframe is present (defensive belt-and-suspenders)
  setInterval(function() {
    var hasYt = document.querySelector('.yt-overlay iframe');
    var bg = document.getElementById('bg-music');
    if (hasYt && bg && (!bg.muted || bg.volume > 0)) {
      bg.muted = true;
      bg.volume = 0;
    }
  }, 500);

  var observer = new MutationObserver(function(muts) {
    var hasYt = false;
    muts.forEach(function(m) {
      m.addedNodes && m.addedNodes.forEach(function(n) {
        if (n.nodeType === 1 && (n.classList && n.classList.contains('yt-overlay') ||
            (n.querySelector && n.querySelector('.yt-overlay')))) {
          hasYt = true;
        }
      });
    });
    if (hasYt) setTimeout(bindEndListener, 400);
  });
  document.addEventListener('DOMContentLoaded', function() {
    var game = document.getElementById('game');
    if (game) observer.observe(game, { childList: true, subtree: true });
    window.onYouTubeIframeAPIReady = function() { bindEndListener(); };
  });
})();
</script>
